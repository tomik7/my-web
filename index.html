<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomášovi úkoly | Zabezpečeno</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #1a2a6c, #11998e, #38ef7d);
            background-size: 400% 400%;
            animation: pozadiAnimace 15s ease infinite;
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes pozadiAnimace {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .kontejner {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center; width: 90%; max-width: 500px;
        }

        h1 { margin-top: 0; font-size: 2.5em; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        input[type="email"], input[type="password"] {
            padding: 15px; border-radius: 10px; border: none; outline: none;
            font-size: 16px; text-align: center; margin-bottom: 15px;
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.9);
        }

        .tlacitko {
            padding: 15px 30px; border: none; border-radius: 10px;
            font-size: 1.1em; font-weight: bold; color: white; cursor: pointer;
            transition: 0.3s; width: 100%; margin-top: 10px;
        }
        .tlacitko-login { background: #2ecc71; }
        .tlacitko-login:hover { background: #27ae60; transform: translateY(-3px); }
        .tlacitko-logout { background: #e74c3c; margin-top: 30px; }

        /* --- STYL PRO JEDNOTLIVÉ ÚKOLY --- */
        #tajnyObsah { display: none; }
        
        .ukol-karta {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 20px; margin-bottom: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px; text-align: left;
            transition: 0.3s;
        }
        .ukol-karta:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(5px); }
        
        /* Checkbox (Zaškrtávátko) */
        input[type="checkbox"] {
            width: 25px; height: 25px; cursor: pointer; accent-color: #2ecc71;
        }
        
        /* Text úkolu */
        .text-ukolu { font-size: 1.2em; font-weight: bold; transition: 0.3s; }
        
        /* Třída, která se přidá, když je úkol hotový (škrtnutí) */
        .hotovo .text-ukolu {
            text-decoration: line-through; color: rgba(255,255,255,0.4);
        }

    </style>
</head>
<body>

    <div class="kontejner">
        <h1>Tomášovi úkoly ✅</h1>
        
        <div id="loginSekce">
            <p>Vítej ve své soukromé aplikaci. Prosím, přihlas se.</p>
            <input type="email" id="emailInput" placeholder="Tvůj e-mail...">
            <input type="password" id="hesloInput" placeholder="Tvé tajné heslo...">
            <button id="loginBtn" class="tlacitko tlacitko-login">Odemknout úkoly</button>
        </div>

        <div id="tajnyObsah">
            <p style="color: #2ecc71; font-weight: bold;">Přístup povolen. Tvé úkoly ze serveru:</p>
            
            <div id="seznamUkolu">Načítám data z trezoru...</div>

            <button id="logoutBtn" class="tlacitko tlacitko-logout">Zamknout a odhlásit se</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Funkce pro odškrtávání úkolů (musí být dostupná pro HTML)
        window.odskrtniUkol = function(checkboxElement) {
            const karta = checkboxElement.parentElement; // Najde nadřazenou krabičku úkolu
            if (checkboxElement.checked) {
                karta.classList.add("hotovo"); // Přidá škrtanec
            } else {
                karta.classList.remove("hotovo"); // Odebere škrtanec
            }
        };

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value;
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo)
                .then((userCredential) => {
                    
                    // Jdeme do trezoru pro složku "ukoly" a dokument "seznam"
                    const tajneUkoly = doc(db, "ukoly", "seznam");
                    
                    getDoc(tajneUkoly).then((dokument) => {
                        if (dokument.exists()) {
                            const data = dokument.data();
                            let htmlUkolu = "";
                            
                            // Projdeme všechny úkoly z databáze a vytvoříme pro ně HTML krabičky
                            for (const klic in data) {
                                htmlUkolu += `
                                    <div class="ukol-karta">
                                        <input type="checkbox" onchange="odskrtniUkol(this)">
                                        <span class="text-ukolu">${data[klic]}</span>
                                    </div>
                                `;
                            }
                            
                            document.getElementById("seznamUkolu").innerHTML = htmlUkolu;
                            
                            document.getElementById("loginSekce").style.display = "none";
                            document.getElementById("tajnyObsah").style.display = "block";
                            document.getElementById("emailInput").value = ""; 
                            document.getElementById("hesloInput").value = ""; 
                        } else {
                            alert("Úkoly se nenašly. Založil jsi ve Firebase složku 'ukoly' a dokument 'seznam'?");
                        }
                    }).catch((chyba) => {
                        console.error(chyba);
                        alert("Chyba při stahování úkolů z trezoru.");
                    });

                })
                .catch((error) => {
                    alert("Špatný e-mail nebo heslo!");
                });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("seznamUkolu").innerHTML = "Načítám data z trezoru...";
            });
        });
    </script>
</body>
</html>
