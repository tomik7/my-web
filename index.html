<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let poleUkolu = [];
        let kontoTomas = 0;
        let kontoMartin = 0;
        
        const eMailyRodicu = ["lenka@turecek.cz", "radek@turecek.cz"];
        let roleUzivatele = ""; 

        function vykresliBanku() {
            let limit = 1000;
            
            let btnTomas = (kontoTomas >= limit && roleUzivatele === "tomas") ? `<button onclick="vyplatit('Tomáš')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em; box-shadow: 0 0 10px #f1c40f;">🎉 Vyžádat výplatu</button>` : "";
            let btnMartin = (kontoMartin >= limit && roleUzivatele === "martin") ? `<button onclick="vyplatit('Martin')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em; box-shadow: 0 0 10px #f1c40f;">🎉 Vyžádat výplatu</button>` : "";
            
            let btnResetTomas = (roleUzivatele === "rodic") ? `<button onclick="vynulovatKonto('tomas')" style="background:#e74c3c; color:white; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">Vynulovat</button>` : "";
            let btnResetMartin = (roleUzivatele === "rodic") ? `<button onclick="vynulovatKonto('martin')" style="background:#e74c3c; color:white; border:none; border-radius:5px; margin-top:5px; cursor:pointer;">Vynulovat</button>` : "";

            document.getElementById("bankaSekce").innerHTML = `
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1);">
                    <div>
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Tomáš</h3>
                        <b style="font-size:1.2em;">${kontoTomas} / ${limit} Kč</b><br>
                        ${btnTomas} ${btnResetTomas}
                    </div>
                    <div>
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Martin</h3>
                        <b style="font-size:1.2em;">${kontoMartin} / ${limit} Kč</b><br>
                        ${btnMartin} ${btnResetMartin}
                    </div>
                </div>
            `;
        }

        function ziskejAktualniOdmenu(ukol) {
            let dnes = new Date().toISOString().split('T')[0];
            // POJISTKA 1: Převod na čisté matematické číslo
            let odmenaCislo = parseInt(ukol.odmena) || 0; 
            
            if (ukol.termin && ukol.termin < dnes && !ukol.splneno) {
                return Math.floor(odmenaCislo / 2); 
            }
            return odmenaCislo;
        }

        function vykresliUkoly() {
            let html = "";
            if (poleUkolu.length === 0) {
                html = "<p style='color: rgba(255,255,255,0.7);'>Žádné úkoly k dispozici. Paráda! 🏖️</p>";
            }

            let dnes = new Date().toISOString().split('T')[0];

            poleUkolu.forEach((ukol, index) => {
                let checked = ukol.splneno ? "checked" : "";
                let tridaHotovo = ukol.splneno ? "hotovo" : "";
                let tlacitkoSmazat = (roleUzivatele === "rodic") ? `<button class="smazat-btn" onclick="smazUkol(${index})">✖</button>` : "";
                let odznak = "";
                
                if (ukol.splneno && ukol.splnilKdo === "tomas") odznak = `<span class="odznak-kdo">Splnil Tomáš</span>`;
                if (ukol.splneno && ukol.splnilKdo === "martin") odznak = `<span class="odznak-kdo">Splnil Martin</span>`;

                let datumText = ukol.termin ? `<span class="datum-text">⏰ Do: ${ukol.termin.split('-').reverse().join('.')}</span>` : "";
                let stitekPozde = "";
                let aktualniOdmena = ziskejAktualniOdmenu(ukol);
                
                if (ukol.termin && ukol.termin < dnes && !ukol.splneno) {
                    stitekPozde = `<span class="odmena-stitek stitek-pozde">PO TERMÍNU (-50 %)</span>`;
                }

                html += `
                <div class="ukol-karta ${tridaHotovo}">
                    <div class="ukol-leva-cast">
                        <input type="checkbox" ${checked} onchange="zmenStav(${index}, this.checked)">
                        <div>
                            <span class="text-ukolu">${ukol.nazev} ${odznak}</span>
                            ${datumText}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${stitekPozde}
                        <span class="odmena-stitek">${aktualniOdmena} Kč</span>
                        ${tlacitkoSmazat}
                    </div>
                </div>`;
            });
            document.getElementById("seznamUkolu").innerHTML = html;
            vykresliBanku();
        }

        function ulozDoDatabaze() {
            // POJISTKA 2: Nikdy neuložíme záporné číslo
            if (kontoTomas < 0) kontoTomas = 0;
            if (kontoMartin < 0) kontoMartin = 0;
            
            const tajneUkoly = doc(db, "ukoly", "seznam");
            setDoc(tajneUkoly, { dataUkolu: poleUkolu, bankaTomas: kontoTomas, bankaMartin: kontoMartin });
        }

        window.zmenStav = function(index, jeSplneno) {
            let ukol = poleUkolu[index];

            if (jeSplneno) {
                if (roleUzivatele === "rodic") {
                    alert("Vy úkoly plnit nemůžete, nechte to na kluky! 😄");
                    vykresliUkoly(); 
                    return;
                }

                let castka = ziskejAktualniOdmenu(ukol); 
                document.getElementById('zvukCinknuti')?.play().catch(e => console.log("Zvuk blokován"));
                
                ukol.splneno = true;
                ukol.splnilKdo = roleUzivatele; 
                ukol.odmena = castka; 
                
                if (roleUzivatele === "tomas") kontoTomas = (parseInt(kontoTomas) || 0) + castka;
                if (roleUzivatele === "martin") kontoMartin = (parseInt(kontoMartin) || 0) + castka;

            } else {
                if (roleUzivatele !== "rodic" && roleUzivatele !== ukol.splnilKdo) {
                    alert("Tento úkol už splnil brácha! Nemůžeš mu ho zrušit. 🛑");
                    vykresliUkoly(); 
                    return;
                }

                ukol.splneno = false;
                let castkaKOdecteni = parseInt(ukol.odmena) || 0;
                
                if (ukol.splnilKdo === "tomas") kontoTomas = (parseInt(kontoTomas) || 0) - castkaKOdecteni;
                if (ukol.splnilKdo === "martin") kontoMartin = (parseInt(kontoMartin) || 0) - castkaKOdecteni;
                ukol.splnilKdo = null;
            }
            
            ulozDoDatabaze();
            vykresliUkoly();
        };

        window.smazUkol = function(index) {
            poleUkolu.splice(index, 1);
            ulozDoDatabaze();
            vykresliUkoly();
        };

        document.getElementById("pridatBtn").addEventListener("click", () => {
            let nazev = document.getElementById("novyUkol").value;
            let odmena = parseInt(document.getElementById("novaOdmena").value) || 0;
            let termin = document.getElementById("novyDatum").value;

            if (nazev.trim() !== "" && odmena > 0) {
                poleUkolu.push({
                    nazev: nazev,
                    odmena: odmena,
                    termin: termin, 
                    splneno: false,
                    splnilKdo: null
                });
                ulozDoDatabaze();
                vykresliUkoly();
                
                document.getElementById("novyUkol").value = "";
                document.getElementById("novaOdmena").value = "";
                document.getElementById("novyDatum").value = "";
            } else {
                alert("Musíš zadat název a částku!");
            }
        });

        window.vyplatit = function(jmeno) {
            if(typeof confetti === "function") confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => {
                alert(`🎉 Skvělá práce, ${jmeno}! Běž ukázat mobil rodičům, ať ti dají peníze a vynulují konto.`);
            }, 500);
        }
        
        window.vynulovatKonto = function(koho) {
            if (confirm("Opravdu chceš vynulovat toto konto? (Dělá se to až po vyplacení peněz)")) {
                if (koho === "tomas") kontoTomas = 0;
                if (koho === "martin") kontoMartin = 0;
                ulozDoDatabaze();
                vykresliUkoly();
            }
        }

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value.toLowerCase().trim();
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo)
                .then((userCredential) => {
                    if (eMailyRodicu.includes(email)) {
                        roleUzivatele = "rodic";
                        document.getElementById("uvitaciText").innerText = "Administrace rodičů 👑";
                        document.getElementById("ridiciPanel").style.display = "flex";
                    } else if (email === "tomas@turecek.cz") {
                        roleUzivatele = "tomas";
                        document.getElementById("uvitaciText").innerText = "Pracovní režim 💪 (Tomáš)";
                        document.getElementById("ridiciPanel").style.display = "none";
                    } else if (email === "martin@turecek.cz") {
                        roleUzivatele = "martin";
                        document.getElementById("uvitaciText").innerText = "Pracovní režim 💪 (Martin)";
                        document.getElementById("ridiciPanel").style.display = "none";
                    } else {
                        roleUzivatele = "neznamy";
                        document.getElementById("ridiciPanel").style.display = "none";
                    }

                    const tajneUkoly = doc(db, "ukoly", "seznam");
                    getDoc(tajneUkoly).then((dokument) => {
                        if (dokument.exists()) {
                            let data = dokument.data();
                            poleUkolu = data.dataUkolu || [];
                            // POJISTKA 3: Z databáze bereme vždycky jen čisté číslo
                            kontoTomas = parseInt(data.bankaTomas) || 0;
                            kontoMartin = parseInt(data.bankaMartin) || 0;
                        } else {
                            poleUkolu = []; kontoTomas = 0; kontoMartin = 0;
                        }
                        
                        vykresliUkoly();
                        document.getElementById("loginSekce").style.display = "none";
                        document.getElementById("tajnyObsah").style.display = "block";
                    }).catch((chyba) => { console.error(chyba); });
                })
                .catch((error) => { alert("Špatný e-mail nebo heslo!"); });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("emailInput").value = ""; 
                document.getElementById("hesloInput").value = ""; 
                document.getElementById("uvitaciText").innerText = "Turečkovi";
                poleUkolu = []; kontoTomas = 0; kontoMartin = 0; roleUzivatele = "";
            });
        });
    </script>
