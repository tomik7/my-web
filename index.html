<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, inMemoryPersistence);

        let poleUkolu = [];
        let poleHistorie = []; 
        let kontoTomas = 0; let minceTomas = 0;
        let kontoMartin = 0; let minceMartin = 0;
        
        const eMailyRodicu = ["lenka@turecek.cz", "radek@turecek.cz"];
        const slovnikJmen = {
            "lenka@turecek.cz": "Máma", "radek@turecek.cz": "Táta",
            "tomas@turecek.cz": "Tomáš", "martin@turecek.cz": "Martin"
        };
        let roleUzivatele = ""; let jmenoAktualni = "";

        // OPRAVA 1: FILTR NA SPAM V HISTORII
        function zapisDoHistorie(zprava, barva = "#3498db") {
            // Pokud je nová zpráva ÚPLNĚ STEJNÁ jako ta poslední, zahoď ji a nezapisuj!
            if (poleHistorie.length > 0 && poleHistorie[0].text === zprava) {
                return;
            }

            let cas = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
            poleHistorie.unshift({ text: zprava, cas: cas, barva: barva });
            if (poleHistorie.length > 15) poleHistorie.pop();
        }

        function vykresliHistorii() {
            let html = "";
            if (poleHistorie.length === 0) {
                html = "<p style='color:#bdc3c7; font-size:0.9em;'>Zatím se nic nestalo.</p>";
            } else {
                poleHistorie.forEach(zaznam => {
                    html += `
                    <div class="historie-polozka" style="border-left-color: ${zaznam.barva};">
                        <span class="historie-cas">${zaznam.cas}</span>
                        ${zaznam.text}
                    </div>`;
                });
            }
            document.getElementById("historieZaznamy").innerHTML = html;
        }

        function vykresliMince(pocet) {
            if (pocet <= 0) return "<span class='odmena-stitek' style='background: #7f8c8d; color: white; font-size: 0.6em; padding: 5px 10px;'>Zatím bez zlaťáku</span>";
            return "🪙".repeat(pocet);
        }

        function vykresliBanku() {
            let btnProplatitTomas = (roleUzivatele === "rodic" && minceTomas > 0) ? `<button onclick="proplatitMinci('tomas')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            let btnProplatitMartin = (roleUzivatele === "rodic" && minceMartin > 0) ? `<button onclick="proplatitMinci('martin')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            
            let btnResetTomas = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('tomas')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";
            let btnResetMartin = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('martin')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";

            document.getElementById("bankaSekce").innerHTML = `
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); flex-wrap:wrap; gap:10px;">
                    <div style="min-width: 200px; text-align:center;">
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Tomáš</h3>
                        <div class="mince-text" title="Zlaťáky">${vykresliMince(minceTomas)}</div>
                        <b style="font-size:1.1em;">Drobné: ${kontoTomas} / 1000 Kč</b><br>
                        ${btnProplatitTomas} ${btnResetTomas}
                    </div>
                    <div style="min-width: 200px; text-align:center;">
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Martin</h3>
                        <div class="mince-text" title="Zlaťáky">${vykresliMince(minceMartin)}</div>
                        <b style="font-size:1.1em;">Drobné: ${kontoMartin} / 1000 Kč</b><br>
                        ${btnProplatitMartin} ${btnResetMartin}
                    </div>
                </div>
            `;
        }

        function zkontrolujMince() {
            let bouchatKonfety = false;
            while (kontoTomas >= 1000) { kontoTomas -= 1000; minceTomas++; if (roleUzivatele === "tomas") bouchatKonfety = true; }
            while (kontoTomas < 0 && minceTomas > 0) { kontoTomas += 1000; minceTomas--; }
            while (kontoMartin >= 1000) { kontoMartin -= 1000; minceMartin++; if (roleUzivatele === "martin") bouchatKonfety = true; }
            while (kontoMartin < 0 && minceMartin > 0) { kontoMartin += 1000; minceMartin--; }
            if (kontoTomas < 0) kontoTomas = 0; if (kontoMartin < 0) kontoMartin = 0;
            if (bouchatKonfety && typeof confetti === "function") confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
        }

        function ziskejAktualniOdmenu(ukol) {
            let dnes = new Date().toISOString().split('T')[0];
            let odmenaCislo = parseInt(ukol.odmena) || 0; 
            if (ukol.termin && ukol.termin < dnes && !ukol.splneno && !ukol.cekaNaPotvrzeni) return Math.floor(odmenaCislo / 2); 
            return odmenaCislo;
        }

        function vykresliUkoly() {
            let html = "";
            if (poleUkolu.length === 0) { html = "<p style='color: rgba(255,255,255,0.7);'>Žádné úkoly k dispozici. Paráda! 🏖️</p>"; }

            let dnes = new Date().toISOString().split('T')[0];

            poleUkolu.forEach((ukol, index) => {
                let levaCastHTML = ""; let pravaCastHTML = "";
                let tlacitkoSmazat = (roleUzivatele === "rodic") ? `<button class="smazat-btn" onclick="smazUkol(${index})">✖</button>` : "";
                let aktualniOdmena = ziskejAktualniOdmenu(ukol);
                let stitekPozde = (ukol.termin && ukol.termin < dnes && !ukol.splneno) ? `<span class="odmena-stitek stitek-pozde">PO TERMÍNU</span>` : "";
                let datumText = ukol.termin ? `<span class="datum-text">⏰ Do: ${ukol.termin.split('-').reverse().join('.')}</span>` : "";

                if (ukol.splneno) {
                    let jmenoSplnitele = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    levaCastHTML = `<input type="checkbox" checked disabled><div><span class="text-ukolu" style="text-decoration:line-through; opacity:0.6;">${ukol.nazev} <span style="font-size:0.8em; color:#2ecc71;">(Schváleno: ${jmenoSplnitele})</span></span>${datumText}</div>`;
                    pravaCastHTML = `<span class="odmena-stitek" style="opacity:0.6;">${aktualniOdmena} Kč</span> ${tlacitkoSmazat}`;
                } 
                else if (ukol.cekaNaPotvrzeni) {
                    let jmenoZadatele = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    if (roleUzivatele === "rodic") {
                        levaCastHTML = `<span style="font-size: 1.5em; margin-right:10px;">⏳</span><div><span class="text-ukolu" style="color:#f39c12;">${jmenoZadatele} žádá o schválení: <b>${ukol.nazev}</b></span>${datumText}</div>`;
                        pravaCastHTML = `<button onclick="schvalitUkol(${index})" class="tlacitko-schvalit" title="Schválit a připsat peníze">✅ Schválit</button><button onclick="zamitnoutUkol(${index})" class="tlacitko-zamitnout" title="Odmítnout a vrátit k přepracování" style="margin-left:5px;">❌</button>${tlacitkoSmazat}`;
                    } else if (roleUzivatele === ukol.splnilKdo) {
                        levaCastHTML = `<input type="checkbox" checked onchange="zrusitZadost(${index})"><div><span class="text-ukolu" style="color:#f39c12;">⏳ Čekáš na schválení: ${ukol.nazev}</span>${datumText}</div>`;
                        pravaCastHTML = `<span class="odmena-stitek">${aktualniOdmena} Kč</span>`;
                    } else {
                        levaCastHTML = `<input type="checkbox" disabled checked><div><span class="text-ukolu" style="color:#7f8c8d;">🔒 ${jmenoZadatele} právě odevzdal: ${ukol.nazev}</span>${datumText}</div>`;
                        pravaCastHTML = `<span class="odmena-stitek">${aktualniOdmena} Kč</span>`;
                    }
                } 
                else {
                    let disabled = (roleUzivatele === "rodic") ? "disabled" : "";
                    levaCastHTML = `<input type="checkbox" ${disabled} onchange="pozadatOSchvaleni(${index})"><div><span class="text-ukolu">${ukol.nazev}</span>${datumText}</div>`;
                    pravaCastHTML = `${stitekPozde} <span class="odmena-stitek">${aktualniOdmena} Kč</span> ${tlacitkoSmazat}`;
                }

                html += `<div class="ukol-karta" style="${ukol.splneno ? 'opacity:0.6;' : ''}"><div class="ukol-leva-cast">${levaCastHTML}</div><div style="display:flex; align-items:center;">${pravaCastHTML}</div></div>`;
            });
            document.getElementById("seznamUkolu").innerHTML = html;
            vykresliBanku();
            vykresliHistorii(); 
        }

        function ulozDoDatabaze() {
            zkontrolujMince(); 
            const tajneUkoly = doc(db, "ukoly", "seznam");
            setDoc(tajneUkoly, { 
                dataUkolu: poleUkolu, historieZaznamy: poleHistorie,
                bankaTomas: kontoTomas, minceTomas: minceTomas,
                bankaMartin: kontoMartin, minceMartin: minceMartin 
            });
        }

        function stahniDataZDatabaze() {
            document.getElementById("seznamUkolu").innerHTML = "Načítám čerstvá data...";
            const tajneUkoly = doc(db, "ukoly", "seznam");
            getDoc(tajneUkoly).then((dokument) => {
                if (dokument.exists()) {
                    let data = dokument.data();
                    poleUkolu = data.dataUkolu || [];
                    poleHistorie = data.historieZaznamy || [];
                    kontoTomas = parseInt(data.bankaTomas) || 0; minceTomas = parseInt(data.minceTomas) || 0;
                    kontoMartin = parseInt(data.bankaMartin) || 0; minceMartin = parseInt(data.minceMartin) || 0;
                } else {
                    poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0;
                }
                zkontrolujMince(); 
                vykresliUkoly();
            }).catch((chyba) => { console.error(chyba); });
        }

        window.pozadatOSchvaleni = function(index) {
            let ukol = poleUkolu[index];
            ukol.cekaNaPotvrzeni = true; ukol.splneno = false; ukol.splnilKdo = roleUzivatele;
            zapisDoHistorie(`⏳ <b>${jmenoAktualni}</b> dokončil úkol "${ukol.nazev}" a čeká na kontrolu.`, "#f39c12");
            ulozDoDatabaze(); vykresliUkoly();
        };

        window.zrusitZadost = function(index) {
            let ukol = poleUkolu[index];
            ukol.cekaNaPotvrzeni = false; ukol.splnilKdo = null;
            ulozDoDatabaze(); vykresliUkoly();
        };

        window.schvalitUkol = function(index) {
            let ukol = poleUkolu[index];
            ukol.cekaNaPotvrzeni = false; ukol.splneno = true;
            let castka = ziskejAktualniOdmenu(ukol);
            ukol.odmena = castka; 
            if (ukol.splnilKdo === "tomas") kontoTomas += castka;
            if (ukol.splnilKdo === "martin") kontoMartin += castka;
            document.getElementById('zvukCinknuti')?.play().catch(e => console.log("Zvuk blokován"));
            zapisDoHistorie(`✅ Rodič schválil úkol "${ukol.nazev}". Peníze připsány!`, "#2ecc71");
            ulozDoDatabaze(); vykresliUkoly();
        };

        window.zamitnoutUkol = function(index) {
            let ukol = poleUkolu[index];
            let puvodniResitel = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
            ukol.cekaNaPotvrzeni = false; ukol.splneno = false; ukol.splnilKdo = null;
            zapisDoHistorie(`❌ Rodič zamítl úkol "${ukol.nazev}". ${puvodniResitel} to musí předělat!`, "#e74c3c");
            ulozDoDatabaze(); vykresliUkoly();
        }

        window.smazUkol = function(index) {
            zapisDoHistorie(`🗑️ Úkol "${poleUkolu[index].nazev}" byl smazán.`, "#95a5a6");
            poleUkolu.splice(index, 1); ulozDoDatabaze(); vykresliUkoly();
        };

        window.proplatitMinci = function(koho) {
            let jmeno = koho === "tomas" ? "Tomášovi" : "Martinovi";
            if (confirm(`Opravdu jsi předal 1000 Kč v hotovosti ${jmeno}? Zlaťák se trvale smaže z webu.`)) {
                if (koho === "tomas" && minceTomas > 0) minceTomas--;
                if (koho === "martin" && minceMartin > 0) minceMartin--;
                zapisDoHistorie(`💰 Rodič proplatil 1 Zlaťák v hotovosti (${jmeno}).`, "#9b59b6");
                ulozDoDatabaze(); vykresliUkoly();
            }
        }

        window.vynulovatKonto = function(koho) {
            let jmeno = koho === "tomas" ? "Tomášovi" : "Martinovi";
            if (confirm(`POZOR! Smažeš všechny peníze i Zlaťáky pro ${jmeno}. Jsi si jistý?`)) {
                if (koho === "tomas") { kontoTomas = 0; minceTomas = 0; }
                if (koho === "martin") { kontoMartin = 0; minceMartin = 0; }
                zapisDoHistorie(`⚠️ Bankovní konto (${jmeno}) bylo vynulováno.`, "#e74c3c");
                ulozDoDatabaze(); vykresliUkoly();
            }
        }

        document.getElementById("pridatBtn").addEventListener("click", () => {
            let nazev = document.getElementById("novyUkol").value;
            let odmena = parseInt(document.getElementById("novaOdmena").value) || 0;
            let termin = document.getElementById("novyDatum").value;
            if (nazev.trim() !== "" && odmena > 0) {
                poleUkolu.push({ nazev: nazev, odmena: odmena, termin: termin, splneno: false, cekaNaPotvrzeni: false, splnilKdo: null });
                zapisDoHistorie(`➕ Byl přidán nový úkol: "${nazev}" za ${odmena} Kč.`);
                ulozDoDatabaze(); vykresliUkoly();
                document.getElementById("novyUkol").value = ""; document.getElementById("novaOdmena").value = ""; document.getElementById("novyDatum").value = "";
            } else { alert("Musíš zadat název a částku!"); }
        });

        document.getElementById("malyRefreshBtn").addEventListener("click", () => { stahniDataZDatabaze(); });

        document.getElementById("odznacitVseBtn").addEventListener("click", () => {
            if (confirm("Opravdu vyčistit všechny úkoly? (Peníze klukům zůstanou v bance nezměněny. Slouží k přípravě úkolů na další den.)")) {
                poleUkolu.forEach(ukol => { ukol.splneno = false; ukol.cekaNaPotvrzeni = false; ukol.splnilKdo = null; });
                zapisDoHistorie(`🧹 Rodič připravil všechny úkoly na nový den.`, "#2ecc71");
                ulozDoDatabaze(); vykresliUkoly();
            }
        });

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value.toLowerCase().trim();
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo)
                .then(() => {
                    jmenoAktualni = slovnikJmen[email] || "Neznámý uživatel";
                    if (eMailyRodicu.includes(email)) {
                        roleUzivatele = "rodic";
                        document.getElementById("ridiciPanel").style.display = "flex";
                        document.getElementById("odznacitVseBtn").style.display = "block";
                    } else if (email === "tomas@turecek.cz") {
                        roleUzivatele = "tomas";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    } else if (email === "martin@turecek.cz") {
                        roleUzivatele = "martin";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    } else {
                        roleUzivatele = "neznamy";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    }

                    document.getElementById("jmenoPrihlaseneho").innerText = jmenoAktualni;
                    
                    // OPRAVA 2: SCHOVÁNÍ UVÍTACÍHO TEXTU PO PŘIHLÁŠENÍ
                    document.getElementById("uvitaciText").style.display = "none";
                    
                    document.getElementById("uzivatelPanel").style.display = "flex";
                    document.getElementById("loginSekce").style.display = "none";
                    document.getElementById("tajnyObsah").style.display = "block";
                    
                    stahniDataZDatabaze(); 
                })
                .catch((error) => { alert("Špatný e-mail nebo heslo!"); });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("uzivatelPanel").style.display = "none"; 
                
                // OPRAVA 2 (Zpátky): VRÁCENÍ TEXTU PŘI ODHLÁŠENÍ
                document.getElementById("uvitaciText").style.display = "block";
                
                document.getElementById("emailInput").value = ""; 
                document.getElementById("hesloInput").value = ""; 
                poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0; roleUzivatele = "";
            });
        });
    </script>
