<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osobní Portál</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* ========================================== */
        /* SEM VLOŽ SVOJE KRÁSNÉ TMAVÉ CSS Z MINULA   */
        /* ========================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #1a2a6c, #11998e, #38ef7d); /* TADY SI DEJ TY SVOJE BARVY */
            background-size: 400% 400%;
            animation: pozadiAnimace 15s ease infinite;
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes pozadiAnimace { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .kontejner {
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center; width: 95%; max-width: 1000px; margin: 20px 0;
        }

        .top-panel { display: none; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.3); padding: 10px 20px; border-radius: 15px; margin-bottom: 20px; font-size: 1.1em; border: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap; gap: 10px; }
        .maly-refresh { background: #3498db; border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
        .maly-refresh:hover { background: #2980b9; transform: rotate(180deg); }

        h1 { margin-top: 10px; font-size: 2.2em; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .podtitul { color: #f1c40f; font-weight: bold; margin-bottom: 25px; font-size: 1.1em; }
        
        input[type="email"], input[type="password"], input[type="text"], input[type="number"], input[type="date"] { padding: 12px; border-radius: 10px; border: none; outline: none; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; background: rgba(255,255,255,0.9); font-family: inherit; }
        .tlacitko { padding: 15px 20px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; width: 100%; }
        .tlacitko-login { background: #2ecc71; }
        .tlacitko-login:hover { background: #27ae60; transform: translateY(-3px); }
        .tlacitko-logout { background: #e74c3c; margin-top: 20px; }
        .tlacitko-pridat { background: #f39c12; width: auto; margin-top: 0; padding: 12px; }

        /* ROZCESTNÍK (DASHBOARD) */
        .rozcestnik-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px 0; }
        .dlazdice { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 30px 20px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-decoration: none; color: white; }
        .dlazdice:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .dlazdice-ikona { font-size: 3.5em; margin-bottom: 15px; }
        .dlazdice-nadpis { font-size: 1.4em; font-weight: bold; margin: 0 0 5px 0; }
        .dlazdice-popis { font-size: 0.9em; color: #bdc3c7; margin: 0; }
        .dlazdice-zamceno { opacity: 0.5; cursor: not-allowed; }
        .dlazdice-zamceno:hover { transform: none; background: rgba(255, 255, 255, 0.1); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .btn-domu { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-domu:hover { background: rgba(255,255,255,0.25); }

        #tajnyObsah { display: none; }
        #bankaSekce { margin-bottom: 20px; }

        /* STYLY BRIGÁDY */
        .aplikace-grid { display: flex; gap: 20px; flex-wrap: wrap; text-align: left; }
        .hlavni-sloupec { flex: 2; min-width: 300px; }
        .bocni-sloupec { flex: 1; min-width: 250px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); max-height: 600px; overflow-y: auto; position: relative; }
        .pridavani-box { display: none; gap: 10px; margin-bottom: 25px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; border: 1px dashed #f1c40f; align-items: center; flex-wrap: wrap; justify-content: center; }
        .pridavani-box input { margin-bottom: 0; width: auto; flex-grow: 1; }
        
        .ukol-karta { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2); padding: 15px 20px; margin-bottom: 10px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; transition: 0.3s; }
        .ukol-karta:hover { background: rgba(255, 255, 255, 0.25); transform: translateX(5px); }
        .ukol-leva-cast { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; accent-color: #2ecc71; flex-shrink: 0; }
        .text-ukolu { font-size: 1.1em; font-weight: bold; }
        
        .odmena-stitek { background: #ffdf00; color: #333; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 0.9em; white-space: nowrap; }
        .stitek-pozde { background: #e74c3c; color: white; margin-right: 10px; }
        .smazat-btn { background: transparent; border: none; color: #ff7675; cursor: pointer; font-size: 1.2em; margin-left: 10px; }
        .datum-text { font-size: 0.8em; color: #bdc3c7; display: block; margin-top: 5px; font-weight: normal; }
        .mince-text { font-size: 1.6em; margin: 10px 0; letter-spacing: 3px; }

        .historie-nadpis { font-size: 1.2em; font-weight: bold; color: #f1c40f; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .historie-polozka { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.9em; border-left: 3px solid #3498db; }
        .historie-cas { font-size: 0.8em; color: #bdc3c7; display: block; margin-bottom: 3px; }
        .tlacitko-schvalit { background: #2ecc71; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .tlacitko-zamitnout { background: #e74c3c; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* ========================================== */
        /* STYLY PRO KINO (YOUTUBE DESIGN)            */
        /* ========================================== */
        .youtube-nadpis { color: #f1f1f1; text-align: left; margin-bottom: 20px; font-weight: bold; font-size: 1.6em; display: flex; align-items: center; gap: 10px; }
        .youtube-logo { color: #ff0000; font-size: 1.2em; }
        
        /* YouTube pilulkové menu */
        .kino-filtr-lista { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .kino-filtr-btn { background: rgba(255,255,255,0.1); border: 1px solid transparent; color: #f1f1f1; font-size: 0.95em; font-weight: bold; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: 0.2s; }
        .kino-filtr-btn:hover { background: rgba(255,255,255,0.2); }
        .kino-filtr-btn.aktivni { background: #f1f1f1; color: #0f0f0f; }

        /* YouTube Grid */
        .youtube-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; padding-bottom: 30px; }
        
        /* Karta s videem - zaoblené rohy */
        .kino-karta { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; aspect-ratio: 16/9; background: #202020; }
        .kino-karta:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 10; }
        .kino-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; transition: opacity 0.2s; }
        .kino-karta:hover .kino-img { opacity: 0.8; }
        
        /* Červená Play ikona na hover */
        .kino-play-ikona { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3.5em; color: #ff0000; opacity: 0; transition: opacity 0.2s; pointer-events: none; filter: drop-shadow(0 0 8px rgba(0,0,0,0.8)); }
        .kino-karta:hover .kino-play-ikona { opacity: 1; }

        /* Vyskakovací přehrávač */
        #videoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #zavritVideoBtn { position: absolute; top: 20px; right: 30px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.5em; cursor: pointer; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        #zavritVideoBtn:hover { background: #ff0000; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="videoModal">
        <button id="zavritVideoBtn" title="Zavřít kino">✖</button>
        <iframe id="videoPlayer" width="80%" height="80%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);"></iframe>
    </div>

    <div class="kontejner">
        
        <div class="top-panel" id="uzivatelPanel">
            <button id="btnZpetDomu" class="btn-domu" style="display: none;">🏠 Hlavní menu</button>
            <div style="flex-grow: 1;"></div>
            <span style="font-weight: bold; color: #f1c40f; margin-right: 15px;">👤 <span id="jmenoPrihlaseneho"></span></span>
            <button id="malyRefreshBtn" class="maly-refresh" title="Zkontrolovat novinky">🔄</button>
        </div>

        <h1 id="hlavniNadpis" style="text-align: center;">Osobní Portál</h1>
        <p class="podtitul" id="uvitaciText" style="text-align: center;">Přihlas se pro vstup do systému</p>
        
        <div id="loginSekce" style="max-width: 400px; margin: 0 auto;">
            <input type="email" id="emailInput" placeholder="Tvůj e-mail..." style="width: 100%;">
            <input type="password" id="hesloInput" placeholder="Tvé heslo..." style="width: 100%;">
            <button id="loginBtn" class="tlacitko tlacitko-login">Vstoupit</button>
        </div>

        <div id="tajnyObsah">
            
            <div id="obsahRozcestnik" class="rozcestnik-grid">
                
                <div class="dlazdice" onclick="zobrazModul('obsahBrigada', 'Letní Brigáda')">
                    <div class="dlazdice-ikona">💰</div>
                    <h3 class="dlazdice-nadpis">Letní brigáda</h3>
                    <p class="dlazdice-popis">Správa úkolů a rodinná banka.</p>
                </div>

                <div class="dlazdice" id="kartaKino" style="display: none;" onclick="zobrazModul('obsahKino', 'Moje Kino')">
                    <div class="dlazdice-ikona">▶️</div>
                    <h3 class="dlazdice-nadpis">Moje Kino</h3>
                    <p class="dlazdice-popis">Soukromá YouTube videotéka.</p>
                </div>

                <div class="dlazdice dlazdice-zamceno" title="Tento modul ještě není naprogramován">
                    <div class="dlazdice-ikona">🚧</div>
                    <h3 class="dlazdice-nadpis">Další aplikace</h3>
                    <p class="dlazdice-popis">Připravujeme v další aktualizaci...</p>
                </div>

            </div>


            <div id="obsahBrigada" style="display: none;">
                <div id="bankaSekce"></div>

                <div class="aplikace-grid">
                    <div class="hlavni-sloupec">
                        <div class="pridavani-box" id="ridiciPanel">
                            <input type="text" id="novyUkol" placeholder="Název úkolu...">
                            <input type="date" id="novyDatum" title="Dokdy to musí být? (Nepovinné)">
                            <input type="number" id="novaOdmena" placeholder="Částka" style="width: 90px;">
                            <span style="font-weight: bold; font-size: 1.2em;">Kč</span>
                            <button id="pridatBtn" class="tlacitko tlacitko-pridat">➕</button>
                        </div>
                        
                        <div id="seznamUkolu">Načítám data...</div>
                        
                        <div style="text-align: right;">
                            <button id="odznacitVseBtn" style="background: transparent; color: #bdc3c7; border: 1px solid #bdc3c7; padding: 5px 10px; border-radius: 5px; cursor: pointer; display: none; margin-top: 10px; font-size: 0.85em; transition: 0.3s;">🧹 Odznačit vše</button>
                        </div>
                    </div>

                    <div class="bocni-sloupec">
                        <h3 class="historie-nadpis">
                            <span>📋 Informační tabule</span>
                            <button id="smazatHistoriiBtn" style="background: none; border: none; cursor: pointer; font-size: 1em; display: none; padding: 0;" title="Vyčistit tabuli">🗑️</button>
                        </h3>
                        <div id="historieZaznamy">Zatím žádné novinky...</div>
                    </div>
                </div>
            </div>

            <div id="obsahKino" style="display: none; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);">
                <h2 class="youtube-nadpis"><span class="youtube-logo">▶</span> Moje oblíbená videa</h2>
                
                <div class="kino-filtr-lista" id="kinoFiltrMenu">
                    <button class="kino-filtr-btn aktivni" onclick="vykresliKino('vse')">Vše</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('0')">0. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('1')">1. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('2')">2. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('3')">3. série</button>
                </div>

                <div class="youtube-grid" id="kinoGrid">
                    </div>
            </div>

            <button id="logoutBtn" class="tlacitko tlacitko-logout">Odhlásit se a zamknout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, inMemoryPersistence);

        let poleUkolu = []; let poleHistorie = []; 
        let kontoTomas = 0; let minceTomas = 0; let kontoMartin = 0; let minceMartin = 0;
        
        const eMailyRodicu = ["lenka@turecek.cz", "radek@turecek.cz"];
        const slovnikJmen = { "lenka@turecek.cz": "Máma", "radek@turecek.cz": "Táta", "tomas@turecek.cz": "Tomáš", "martin@turecek.cz": "Martin" };
        let roleUzivatele = ""; let jmenoAktualni = "";

        // ==========================================
        // SYSTÉM PŘEPÍNÁNÍ MODULŮ
        // ==========================================
        window.zobrazModul = function(idModulu, novyNadpis = "Osobní Portál") {
            document.getElementById("obsahRozcestnik").style.display = "none";
            document.getElementById("obsahBrigada").style.display = "none";
            document.getElementById("obsahKino").style.display = "none";

            document.getElementById(idModulu).style.display = (idModulu === "obsahRozcestnik") ? "grid" : "block";
            
            document.getElementById("hlavniNadpis").innerText = novyNadpis;
            if (idModulu === "obsahRozcestnik") {
                document.getElementById("btnZpetDomu").style.display = "none"; 
            } else {
                document.getElementById("btnZpetDomu").style.display = "flex"; 
            }
        }

        document.getElementById("btnZpetDomu").addEventListener("click", () => {
            zobrazModul('obsahRozcestnik', 'Osobní Portál');
        });


        // ==========================================
        // KINO YOUTUBE
        // ==========================================
        const videaSerie0 = ["eLDXu4SgsV0", "LYwLerXP8IU", "pPAKMf3fSOY", "v20CVJoF7o0"];
        const videaSerie1 = ["HmPFKQ4Psio", "jp6HJcdiV2w", "_hp1FaOBvdw", "H6BoF7gM94k", "bl0kO0Bn-wQ", "eUM9BI1HVzQ", "VulSiC7UDpo", "yCyShKOgH3s", "p7MPC_TPYc4", "hs-Lf2Ua4gs", "OlEJqaGsJiQ", "8PrlEtzD59A", "9NbWt3uOeqI"];
        const videaSerie2 = ["3oZqKwtUpcQ", "qIoFna9QSeo", "nKBc8W0tiCA", "KEPF8woA0QU", "smY-fJSPzno", "6TPPVVvihUc", "9265g-GNmvs", "DylC_jmN3CA", "cqVWhSjPfog", "kTNuzpPhvAU", "ElMzIZD8JYU", "2ZQRSRwevtE", "1VSkeosVr40"];
        const videaSerie3 = ["8HZC79duYRQ", "LYIxZ9CdfsY", "NSGpiJCPEG0", "XlUeAMfAry8", "RaSkirrHmTk", "Jq0I57UP0Oc", "6xnKLw1Y_f8", "Zoe661tsFs8"];

        window.vykresliKino = function(filtr = 'vse') {
            let videaKVykresleni = [];
            
            if (filtr === 'vse') videaKVykresleni = [...videaSerie0, ...videaSerie1, ...videaSerie2, ...videaSerie3];
            else if (filtr === '0') videaKVykresleni = videaSerie0;
            else if (filtr === '1') videaKVykresleni = videaSerie1;
            else if (filtr === '2') videaKVykresleni = videaSerie2;
            else if (filtr === '3') videaKVykresleni = videaSerie3;

            let htmlKina = "";
            videaKVykresleni.forEach(idVidea => {
                htmlKina += `
                <div class="kino-karta" onclick="spustitVideo('${idVidea}')">
                    <img class="kino-img" src="https://img.youtube.com/vi/${idVidea}/hqdefault.jpg" alt="Video náhled">
                    <div class="kino-play-ikona">▶</div>
                </div>`;
            });
            document.getElementById("kinoGrid").innerHTML = htmlKina;

            const tlacitka = document.querySelectorAll(".kino-filtr-btn");
            tlacitka.forEach(btn => btn.classList.remove("aktivni"));
            if (filtr === 'vse') tlacitka[0].classList.add("aktivni");
            if (filtr === '0') tlacitka[1].classList.add("aktivni");
            if (filtr === '1') tlacitka[2].classList.add("aktivni");
            if (filtr === '2') tlacitka[3].classList.add("aktivni");
            if (filtr === '3') tlacitka[4].classList.add("aktivni");
        }

        window.spustitVideo = function(idVidea) {
            document.getElementById("videoPlayer").src = `https://www.youtube.com/embed/${idVidea}?autoplay=1`;
            document.getElementById("videoModal").style.display = "flex";
        }

        document.getElementById("zavritVideoBtn").addEventListener("click", () => {
            document.getElementById("videoPlayer").src = "";
            document.getElementById("videoModal").style.display = "none";
        });


        // ==========================================
        // LETNÍ BRIGÁDA
        // ==========================================
        function zapisDoHistorie(zprava, barva = "#3498db") {
            if (poleHistorie.length > 0 && poleHistorie[0].text === zprava) return;
            let cas = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
            poleHistorie.unshift({ text: zprava, cas: cas, barva: barva });
            if (poleHistorie.length > 15) poleHistorie.pop();
        }

        function vykresliHistorii() {
            let html = "";
            if (poleHistorie.length === 0) { html = "<p style='color:#bdc3c7; font-size:0.9em;'>Zatím se nic nestalo.</p>"; } 
            else { poleHistorie.forEach(z => { html += `<div class="historie-polozka" style="border-left-color: ${z.barva};"><span class="historie-cas">${z.cas}</span>${z.text}</div>`; }); }
            document.getElementById("historieZaznamy").innerHTML = html;
        }

        function vykresliMince(pocet) {
            if (pocet <= 0) return "<span class='odmena-stitek' style='background: #7f8c8d; color: white; font-size: 0.6em; padding: 5px 10px;'>Zatím bez zlaťáku</span>";
            return "🪙".repeat(pocet);
        }

        function vykresliBanku() {
            let btnProplatitTomas = (roleUzivatele === "rodic" && minceTomas > 0) ? `<button onclick="proplatitMinci('tomas')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            let btnProplatitMartin = (roleUzivatele === "rodic" && minceMartin > 0) ? `<button onclick="proplatitMinci('martin')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            let btnResetTomas = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('tomas')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";
            let btnResetMartin = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('martin')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";

            document.getElementById("bankaSekce").innerHTML = `
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); flex-wrap:wrap; gap:10px;">
                    <div style="min-width: 200px; text-align:center;"><h3 style="margin:0 0 5px 0; color:#38ef7d;">Tomáš</h3><div class="mince-text">${vykresliMince(minceTomas)}</div><b style="font-size:1.1em;">Drobné: ${kontoTomas} / 1000 Kč</b><br>${btnProplatitTomas} ${btnResetTomas}</div>
                    <div style="min-width: 200px; text-align:center;"><h3 style="margin:0 0 5px 0; color:#38ef7d;">Martin</h3><div class="mince-text">${vykresliMince(minceMartin)}</div><b style="font-size:1.1em;">Drobné: ${kontoMartin} / 1000 Kč</b><br>${btnProplatitMartin} ${btnResetMartin}</div>
                </div>`;
        }

        function zkontrolujMince() {
            while (kontoTomas >= 1000) { kontoTomas -= 1000; minceTomas++; }
            while (kontoTomas < 0 && minceTomas > 0) { kontoTomas += 1000; minceTomas--; }
            while (kontoMartin >= 1000) { kontoMartin -= 1000; minceMartin++; }
            while (kontoMartin < 0 && minceMartin > 0) { kontoMartin += 1000; minceMartin--; }
            if (kontoTomas < 0) kontoTomas = 0; if (kontoMartin < 0) kontoMartin = 0;
        }

        function ziskejAktualniOdmenu(ukol) {
            let d = new Date().toISOString().split('T')[0]; let o = parseInt(ukol.odmena) || 0; 
            if (ukol.termin && ukol.termin < d && !ukol.splneno && !ukol.cekaNaPotvrzeni) return Math.floor(o / 2); 
            return o;
        }

        function vykresliUkoly() {
            let html = "";
            if (poleUkolu.length === 0) html = "<p style='color: rgba(255,255,255,0.7);'>Žádné úkoly k dispozici.</p>";
            let d = new Date().toISOString().split('T')[0];

            poleUkolu.forEach((ukol, index) => {
                let lH = ""; let pH = "";
                let tS = (roleUzivatele === "rodic") ? `<button class="smazat-btn" onclick="smazUkol(${index})">✖</button>` : "";
                let aO = ziskejAktualniOdmenu(ukol);
                let sP = (ukol.termin && ukol.termin < d && !ukol.splneno) ? `<span class="odmena-stitek stitek-pozde">PO TERMÍNU</span>` : "";
                let dT = ukol.termin ? `<span class="datum-text">⏰ Do: ${ukol.termin.split('-').reverse().join('.')}</span>` : "";

                if (ukol.splneno) {
                    let jS = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    lH = `<input type="checkbox" checked disabled><div><span class="text-ukolu" style="text-decoration:line-through; opacity:0.6;">${ukol.nazev} <span style="font-size:0.8em; color:#2ecc71;">(Schváleno: ${jS})</span></span>${dT}</div>`;
                    pH = `<span class="odmena-stitek" style="opacity:0.6;">${aO} Kč</span> ${tS}`;
                } else if (ukol.cekaNaPotvrzeni) {
                    let jZ = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    if (roleUzivatele === "rodic") {
                        lH = `<span style="font-size: 1.5em; margin-right:10px;">⏳</span><div><span class="text-ukolu" style="color:#f39c12;">${jZ} žádá o schválení: <b>${ukol.nazev}</b></span>${dT}</div>`;
                        pH = `<button onclick="schvalitUkol(${index})" class="tlacitko-schvalit">✅</button><button onclick="zamitnoutUkol(${index})" class="tlacitko-zamitnout" style="margin-left:5px;">❌</button>${tS}`;
                    } else if (roleUzivatele === ukol.splnilKdo) {
                        lH = `<input type="checkbox" checked onchange="zrusitZadost(${index})"><div><span class="text-ukolu" style="color:#f39c12;">⏳ Čekáš na schválení: ${ukol.nazev}</span>${dT}</div>`;
                        pH = `<span class="odmena-stitek">${aO} Kč</span>`;
                    } else {
                        lH = `<input type="checkbox" disabled checked><div><span class="text-ukolu" style="color:#7f8c8d;">🔒 ${jZ} odevzdal: ${ukol.nazev}</span>${dT}</div>`;
                        pH = `<span class="odmena-stitek">${aO} Kč</span>`;
                    }
                } else {
                    let dis = (roleUzivatele === "rodic") ? "disabled" : "";
                    lH = `<input type="checkbox" ${dis} onchange="pozadatOSchvaleni(${index})"><div><span class="text-ukolu">${ukol.nazev}</span>${dT}</div>`;
                    pH = `${sP} <span class="odmena-stitek">${aO} Kč</span> ${tS}`;
                }
                html += `<div class="ukol-karta" style="${ukol.splneno ? 'opacity:0.6;' : ''}"><div class="ukol-leva-cast">${lH}</div><div style="display:flex; align-items:center;">${pH}</div></div>`;
            });
            document.getElementById("seznamUkolu").innerHTML = html;
            vykresliBanku(); vykresliHistorii(); 
        }

        function ulozDoDatabaze() {
            zkontrolujMince(); 
            setDoc(doc(db, "ukoly", "seznam"), { dataUkolu: poleUkolu, historieZaznamy: poleHistorie, bankaTomas: kontoTomas, minceTomas: minceTomas, bankaMartin: kontoMartin, minceMartin: minceMartin });
        }

        function stahniDataZDatabaze() {
            document.getElementById("seznamUkolu").innerHTML = "Načítám čerstvá data...";
            getDoc(doc(db, "ukoly", "seznam")).then((dokument) => {
                if (dokument.exists()) {
                    let data = dokument.data();
                    poleUkolu = data.dataUkolu || []; poleHistorie = data.historieZaznamy || [];
                    kontoTomas = parseInt(data.bankaTomas) || 0; minceTomas = parseInt(data.minceTomas) || 0;
                    kontoMartin = parseInt(data.bankaMartin) || 0; minceMartin = parseInt(data.minceMartin) || 0;
                } else {
                    poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0;
                }
                zkontrolujMince(); vykresliUkoly();
            }).catch((chyba) => { console.error(chyba); });
        }

        window.pozadatOSchvaleni = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = true; u.splneno = false; u.splnilKdo = roleUzivatele; zapisDoHistorie(`⏳ <b>${jmenoAktualni}</b> dokončil úkol "${u.nazev}".`, "#f39c12"); ulozDoDatabaze(); vykresliUkoly(); };
        window.zrusitZadost = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splnilKdo = null; poleHistorie = poleHistorie.filter(z => !(z.text.includes(u.nazev) && z.text.includes("dokončil úkol"))); ulozDoDatabaze(); vykresliUkoly(); };
        window.schvalitUkol = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splneno = true; let c = ziskejAktualniOdmenu(u); u.odmena = c; if (u.splnilKdo === "tomas") kontoTomas += c; if (u.splnilKdo === "martin") kontoMartin += c; document.getElementById('zvukCinknuti')?.play().catch(e=>e); zapisDoHistorie(`✅ Rodič schválil úkol "${u.nazev}".`, "#2ecc71"); ulozDoDatabaze(); vykresliUkoly(); };
        window.zamitnoutUkol = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splneno = false; u.splnilKdo = null; zapisDoHistorie(`❌ Rodič zamítl úkol "${u.nazev}". Musí se předělat!`, "#e74c3c"); ulozDoDatabaze(); vykresliUkoly(); }
        window.smazUkol = function(index) { zapisDoHistorie(`🗑️ Úkol "${poleUkolu[index].nazev}" byl smazán.`, "#95a5a6"); poleUkolu.splice(index, 1); ulozDoDatabaze(); vykresliUkoly(); };
        window.proplatitMinci = function(k) { if (confirm(`Proplatit 1000 Kč v hotovosti?`)) { if (k === "tomas" && minceTomas > 0) minceTomas--; if (k === "martin" && minceMartin > 0) minceMartin--; zapisDoHistorie(`💰 Rodič proplatil 1 Zlaťák.`, "#9b59b6"); ulozDoDatabaze(); vykresliUkoly(); } }
        window.vynulovatKonto = function(k) { if (confirm(`Smažeš všechny peníze i Zlaťáky. Jsi si jistý?`)) { if (k === "tomas") { kontoTomas = 0; minceTomas = 0; } if (k === "martin") { kontoMartin = 0; minceMartin = 0; } zapisDoHistorie(`⚠️ Bankovní konto bylo vynulováno.`, "#e74c3c"); ulozDoDatabaze(); vykresliUkoly(); } }

        document.getElementById("pridatBtn").addEventListener("click", () => { let n = document.getElementById("novyUkol").value; let o = parseInt(document.getElementById("novaOdmena").value) || 0; let t = document.getElementById("novyDatum").value; if (n.trim() !== "" && o > 0) { poleUkolu.push({ nazev: n, odmena: o, termin: t, splneno: false, cekaNaPotvrzeni: false, splnilKdo: null }); zapisDoHistorie(`➕ Přidán úkol: "${n}" za ${o} Kč.`); ulozDoDatabaze(); vykresliUkoly(); document.getElementById("novyUkol").value = ""; document.getElementById("novaOdmena").value = ""; document.getElementById("novyDatum").value = ""; } else { alert("Musíš zadat název a částku!"); } });
        document.getElementById("malyRefreshBtn").addEventListener("click", () => { stahniDataZDatabaze(); });
        document.getElementById("odznacitVseBtn").addEventListener("click", () => { if (confirm("Vyčistit všechny úkoly na další den?")) { poleUkolu.forEach(u => { u.splneno = false; u.cekaNaPotvrzeni = false; u.splnilKdo = null; }); zapisDoHistorie(`🧹 Úkoly připraveny na nový den.`, "#2ecc71"); ulozDoDatabaze(); vykresliUkoly(); } });
        document.getElementById("smazatHistoriiBtn").addEventListener("click", () => { if (confirm("Vymazat tabuli?")) { poleHistorie = []; ulozDoDatabaze(); vykresliHistorii(); } });

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value.toLowerCase().trim();
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo).then(() => {
                jmenoAktualni = slovnikJmen[email] || "Neznámý uživatel";
                
                if (eMailyRodicu.includes(email)) {
                    roleUzivatele = "rodic";
                    document.getElementById("ridiciPanel").style.display = "flex";
                    document.getElementById("odznacitVseBtn").style.display = "inline-block";
                    document.getElementById("smazatHistoriiBtn").style.display = "inline-block"; 
                    document.getElementById("kartaKino").style.display = "none";
                } else if (email === "tomas@turecek.cz") {
                    roleUzivatele = "tomas";
                    document.getElementById("ridiciPanel").style.display = "none";
                    document.getElementById("odznacitVseBtn").style.display = "none";
                    document.getElementById("smazatHistoriiBtn").style.display = "none";
                    document.getElementById("kartaKino").style.display = "flex"; // KINO
                } else if (email === "martin@turecek.cz") {
                    roleUzivatele = "martin";
                    document.getElementById("ridiciPanel").style.display = "none";
                    document.getElementById("odznacitVseBtn").style.display = "none";
                    document.getElementById("smazatHistoriiBtn").style.display = "none";
                    document.getElementById("kartaKino").style.display = "none";
                }

                document.getElementById("jmenoPrihlaseneho").innerText = jmenoAktualni;
                document.getElementById("uvitaciText").style.display = "none";
                document.getElementById("uzivatelPanel").style.display = "flex";
                document.getElementById("loginSekce").style.display = "none";
                document.getElementById("tajnyObsah").style.display = "block";
                
                vykresliKino('vse');
                zobrazModul('obsahRozcestnik', 'Osobní Portál');
                stahniDataZDatabaze(); 
            }).catch((error) => { alert("Špatný e-mail nebo heslo!"); });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("uzivatelPanel").style.display = "none"; 
                document.getElementById("uvitaciText").style.display = "block";
                document.getElementById("hlavniNadpis").innerText = "Osobní Portál";
                document.getElementById("emailInput").value = ""; document.getElementById("hesloInput").value = ""; 
                poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0; roleUzivatele = "";
            });
        });
    </script>
</body>
</html>
