<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomáš Tureček - Můj Web</title>
    <style>
        /* Tady začíná CSS - to určuje, jak web vypadá (barvy, tvary, rozložení) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Nastavíme krásné přechodové pozadí */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
        }
        /* Tento "kontejner" udělá ten hezký průhledný rámeček uprostřed */
        .kontejner {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px); /* Efekt rozmazaného skla */
        }
        /* Nastavení vaší profilové fotky */
        img.profilovka {
            width: 150px;
            height: 150px;
            border-radius: 50%; /* Udělá z fotky kruh */
            border: 4px solid white;
            margin-bottom: 20px;
        }
        /* Nastavení klikacího tlačítka */
        .tlacitko {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #ff7e67;
            color: white;
            text-decoration: none; /* Skryje podtržení odkazu */
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s; /* Aby se tlačítko měnilo plynule */
        }
        /* Co se stane, když na tlačítko najedete myší */
        .tlacitko:hover {
            background-color: #ff5e42;
            transform: scale(1.05); /* Trochu se zvětší */
        }
        /* Rámeček pro video */
        .video-box {
            margin-top: 30px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="kontejner">
        <img src="https://github.com/tomik7.png" alt="Tomáš Tureček" class="profilovka">
        
        <h1>Ahoj, já jsem Tomáš! 🚀</h1>
        <p>Vítejte na mém prvním webu. Zrovna objevuji taje kódování a moc mě to baví.</p>
        
        <a href="https://github.com/tomik7" target="_blank" class="tlacitko">Koukni na můj GitHub</a>
        
        <div class="video-box">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/86YLFOog4GM" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
