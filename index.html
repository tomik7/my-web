<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osobní Portál</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* ========================================== */
        /* CLEAN MODERNÍ DARK DESIGN                  */
        /* ========================================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            background: linear-gradient(135deg, #1b737b, #13555c);
            color: #ecf0f1; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .kontejner {
            background: #142f34; /* Tmavý petrolejový kontejner */
            padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            text-align: center; width: 100%; max-width: 900px; box-sizing: border-box;
        }

        /* ČISTÁ HORNÍ LIŠTA */
        .top-panel { 
            display: none; justify-content: space-between; align-items: center; 
            background: #1a3c42; padding: 10px 15px; border-radius: 12px; 
            margin-bottom: 25px; font-size: 1em;
        }
        .btn-domu { 
            background: #2a4c52; border: none; color: white; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; 
            display: flex; align-items: center; gap: 8px; font-size: 0.9em;
        }
        .btn-domu:hover { background: #355d64; }
        
        .maly-refresh { 
            background: #3498db; border: none; color: white; border-radius: 50%; 
            width: 35px; height: 35px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center; justify-content: center; font-size: 1.1em;
            margin-left: 10px;
        }
        .maly-refresh:hover { background: #2980b9; transform: rotate(180deg); }

        h1 { margin: 0 0 10px 0; font-size: 2em; letter-spacing: 1px; }
        .podtitul { color: #bdc3c7; font-weight: normal; margin-bottom: 25px; font-size: 1em; }
        
        input[type="email"], input[type="password"], input[type="text"], input[type="number"], input[type="date"] { 
            padding: 12px; border-radius: 8px; border: none; outline: none; 
            font-size: 15px; margin-bottom: 10px; box-sizing: border-box; 
            background: #e0e6ed; color: #2c3e50; font-family: inherit;
        }
        .tlacitko { 
            padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; 
            font-weight: bold; color: white; cursor: pointer; transition: 0.2s; width: 100%; 
        }
        .tlacitko-login { background: #2ecc71; }
        .tlacitko-login:hover { background: #27ae60; }
        
        /* Velké červené tlačítko na odhlášení dole */
        .tlacitko-logout { background: #e74c3c; margin-top: 20px; padding: 15px; font-size: 1.1em; }
        .tlacitko-logout:hover { background: #c0392b; }
        
        .tlacitko-pridat { background: #f39c12; width: auto; margin-top: 0; padding: 12px 20px; }

        #tajnyObsah { display: none; }

        /* ROZCESTNÍK (DASHBOARD) */
        .rozcestnik-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 10px 0; }
        .dlazdice { background: #1e3f46; border-radius: 16px; padding: 30px 20px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-decoration: none; border: 1px solid transparent; }
        .dlazdice:hover { background: #264e56; transform: translateY(-3px); border-color: rgba(255,255,255,0.1); }
        .dlazdice-ikona { font-size: 3em; margin-bottom: 15px; }
        .dlazdice-nadpis { font-size: 1.2em; font-weight: bold; margin: 0 0 5px 0; }
        .dlazdice-popis { font-size: 0.85em; color: #95a5a6; margin: 0; }
        .dlazdice-zamceno { opacity: 0.4; cursor: not-allowed; }
        .dlazdice-zamceno:hover { transform: none; background: #1e3f46; border-color: transparent; }

        /* BRIGÁDA ROZLOŽENÍ */
        .aplikace-grid { display: flex; gap: 20px; flex-wrap: wrap; text-align: left; }
        .hlavni-sloupec { flex: 2; min-width: 300px; }
        .bocni-sloupec { flex: 1; min-width: 250px; background: #1a3c42; padding: 20px; border-radius: 12px; max-height: 600px; overflow-y: auto; }
        
        /* BANKA */
        #bankaSekce { margin-bottom: 20px; }
        .banka-box { display: flex; justify-content: space-around; background: #16363c; padding: 20px; border-radius: 12px; flex-wrap: wrap; gap: 15px; }
        .banka-osoba { min-width: 180px; text-align: center; }
        .banka-jmeno { margin: 0 0 10px 0; color: #2ecc71; font-size: 1.2em; font-weight: bold;}
        .mince-stitek { background: #4a5f63; color: white; font-size: 0.75em; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
        .mince-zlato { font-size: 1.4em; letter-spacing: 3px; display: block; margin-bottom: 5px;}
        .banka-drobne { font-size: 1.1em; font-weight: bold; }
        
        /* PŘIDÁVÁNÍ ÚKOLŮ */
        .pridavani-box { display: none; gap: 10px; margin-bottom: 20px; background: #1a3c42; padding: 15px; border-radius: 12px; align-items: center; flex-wrap: wrap; border: 1px dashed #f1c40f;}
        .pridavani-box input { margin-bottom: 0; width: auto; flex-grow: 1; }
        
        /* KARTY ÚKOLŮ */
        .ukol-karta { background: #214147; padding: 15px 20px; margin-bottom: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; transition: 0.2s; border: 1px solid transparent; }
        .ukol-karta:hover { background: #264b52; border-color: rgba(255,255,255,0.05); }
        .ukol-leva-cast { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #2ecc71; flex-shrink: 0; }
        .text-ukolu { font-size: 1.05em; font-weight: 600; color: #ecf0f1;}
        
        .odmena-stitek { background: #f1c40f; color: #2c3e50; padding: 4px 10px; border-radius: 15px; font-weight: bold; font-size: 0.85em; white-space: nowrap; }
        .stitek-pozde { background: #e74c3c; color: white; margin-right: 10px; }
        .smazat-btn { background: transparent; border: none; color: #e74c3c; cursor: pointer; font-size: 1.1em; margin-left: 10px; opacity: 0.7; transition: 0.2s;}
        .smazat-btn:hover { opacity: 1; }
        .datum-text { font-size: 0.8em; color: #95a5a6; display: flex; align-items: center; gap: 5px; margin-top: 4px; }

        /* HISTORIE */
        .historie-nadpis { font-size: 1.1em; font-weight: bold; color: #f1c40f; margin: 0 0 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .historie-polozka { background: #1e3b40; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85em; border-left: 3px solid #3498db; color: #ecf0f1;}
        .historie-cas { font-size: 0.8em; color: #95a5a6; display: block; margin-bottom: 4px; }
        
        .tlacitko-schvalit { background: #2ecc71; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em;}
        .tlacitko-zamitnout { background: #e74c3c; border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.85em;}

        /* KINO CLEAN DESIGN */
        .kino-filtr-lista { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .kino-filtr-btn { background: #1a3c42; border: none; color: #bdc3c7; font-size: 0.9em; font-weight: bold; cursor: pointer; padding: 8px 16px; border-radius: 20px; transition: 0.2s; }
        .kino-filtr-btn:hover { background: #264b52; color: white; }
        .kino-filtr-btn.aktivni { background: #ecf0f1; color: #142f34; }

        .youtube-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; padding-bottom: 20px; }
        .kino-karta { position: relative; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; aspect-ratio: 16/9; background: #000; }
        .kino-karta:hover { transform: scale(1.03); z-index: 10; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .kino-img { width: 100%; height: 100%; object-fit: cover; transition: 0.2s; }
        .kino-karta:hover .kino-img { opacity: 0.7; }
        .kino-play-ikona { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3em; color: #ff0000; opacity: 0; transition: 0.2s; pointer-events: none; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .kino-karta:hover .kino-play-ikona { opacity: 1; }

        #videoModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        #zavritVideoBtn { position: absolute; top: 20px; right: 30px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.5em; cursor: pointer; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        #zavritVideoBtn:hover { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="videoModal">
        <button id="zavritVideoBtn" title="Zavřít kino">✖</button>
        <iframe id="videoPlayer" width="85%" height="85%" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);"></iframe>
    </div>

    <div class="kontejner">
        
        <div class="top-panel" id="uzivatelPanel">
            <button id="btnZpetDomu" class="btn-domu" style="display: none;">🏠 Hlavní menu</button>
            <div style="flex-grow: 1;"></div>
            <span style="font-weight: 600; color: #f1c40f; display:flex; align-items:center;">
                <span style="margin-right: 5px;">👤</span> <span id="jmenoPrihlaseneho"></span>
            </span>
            <button id="malyRefreshBtn" class="maly-refresh" title="Zkontrolovat novinky">🔄</button>
        </div>

        <h1 id="hlavniNadpis">Osobní Portál</h1>
        <p class="podtitul" id="uvitaciText">Přihlas se pro vstup do systému</p>
        
        <div id="loginSekce" style="max-width: 350px; margin: 0 auto;">
            <input type="email" id="emailInput" placeholder="E-mail" style="width: 100%;">
            <input type="password" id="hesloInput" placeholder="Heslo" style="width: 100%;">
            <button id="loginBtn" class="tlacitko tlacitko-login">Vstoupit</button>
        </div>

        <div id="tajnyObsah">
            
            <div id="obsahRozcestnik" class="rozcestnik-grid">
                <div class="dlazdice" onclick="zobrazModul('obsahBrigada', 'Letní Brigáda')">
                    <div class="dlazdice-ikona">💰</div>
                    <h3 class="dlazdice-nadpis">Letní brigáda</h3>
                    <p class="dlazdice-popis">Správa úkolů a rodinná banka.</p>
                </div>
                <div class="dlazdice" id="kartaKino" style="display: none;" onclick="zobrazModul('obsahKino', 'Moje Kino')">
                    <div class="dlazdice-ikona">▶️</div>
                    <h3 class="dlazdice-nadpis">Moje Kino</h3>
                    <p class="dlazdice-popis">Soukromá videotéka.</p>
                </div>
                <div class="dlazdice dlazdice-zamceno" title="Tento modul ještě není naprogramován">
                    <div class="dlazdice-ikona">🚧</div>
                    <h3 class="dlazdice-nadpis">Další aplikace</h3>
                    <p class="dlazdice-popis">Připravujeme...</p>
                </div>
            </div>

            <div id="obsahBrigada" style="display: none;">
                
                <div id="bankaSekce"></div>

                <div class="aplikace-grid">
                    <div class="hlavni-sloupec">
                        <div class="pridavani-box" id="ridiciPanel">
                            <input type="text" id="novyUkol" placeholder="Název úkolu...">
                            <input type="date" id="novyDatum" title="Dokdy to musí být? (Nepovinné)">
                            <input type="number" id="novaOdmena" placeholder="Částka" style="width: 80px;">
                            <span style="font-weight: bold; font-size: 1.1em; margin-right:5px;">Kč</span>
                            <button id="pridatBtn" class="tlacitko tlacitko-pridat">➕</button>
                        </div>
                        
                        <div id="seznamUkolu">Načítám data...</div>
                        
                        <div style="text-align: left; margin-top: 15px;">
                            <button id="odznacitVseBtn" style="background: rgba(155, 89, 182, 0.2); color: #c8d6e5; border: 1px solid rgba(155, 89, 182, 0.5); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: none; font-size: 0.85em; transition: 0.2s;">🧹 Odznačit všechny úkoly</button>
                        </div>
                    </div>

                    <div class="bocni-sloupec">
                        <h3 class="historie-nadpis">
                            <span style="display: flex; align-items: center; gap: 8px;">📋 Informační tabule</span>
                            <button id="smazatHistoriiBtn" style="background: none; border: none; cursor: pointer; font-size: 1.1em; display: none; padding: 0; color: #e74c3c; opacity: 0.7;" title="Vyčistit tabuli">🗑️</button>
                        </h3>
                        <div id="historieZaznamy">Zatím žádné novinky...</div>
                    </div>
                </div>
            </div>

            <div id="obsahKino" style="display: none;">
                <div class="kino-filtr-lista" id="kinoFiltrMenu">
                    <button class="kino-filtr-btn aktivni" onclick="vykresliKino('vse')">Vše</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('0')">0. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('1')">1. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('2')">2. série</button>
                    <button class="kino-filtr-btn" onclick="vykresliKino('3')">3. série</button>
                </div>
                <div class="youtube-grid" id="kinoGrid"></div>
            </div>

            <button id="logoutBtn" class="tlacitko tlacitko-logout">Odhlásit se a zamknout</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, inMemoryPersistence);

        let poleUkolu = []; let poleHistorie = []; 
        let kontoTomas = 0; let minceTomas = 0; let kontoMartin = 0; let minceMartin = 0;
        
        const eMailyRodicu = ["lenka@turecek.cz", "radek@turecek.cz"];
        const slovnikJmen = { "lenka@turecek.cz": "Máma", "radek@turecek.cz": "Táta", "tomas@turecek.cz": "Tomáš", "martin@turecek.cz": "Martin" };
        let roleUzivatele = ""; let jmenoAktualni = "";

        // ==========================================
        // SYSTÉM PŘEPÍNÁNÍ MODULŮ
        // ==========================================
        window.zobrazModul = function(idModulu, novyNadpis = "Osobní Portál") {
            document.getElementById("obsahRozcestnik").style.display = "none";
            document.getElementById("obsahBrigada").style.display = "none";
            document.getElementById("obsahKino").style.display = "none";

            document.getElementById(idModulu).style.display = (idModulu === "obsahRozcestnik") ? "grid" : "block";
            document.getElementById("hlavniNadpis").innerText = novyNadpis;
            
            if (idModulu === "obsahRozcestnik") {
                document.getElementById("btnZpetDomu").style.display = "none"; 
            } else {
                document.getElementById("btnZpetDomu").style.display = "flex"; 
            }
        }

        document.getElementById("btnZpetDomu").addEventListener("click", () => {
            zobrazModul('obsahRozcestnik', 'Osobní Portál');
        });

        // ==========================================
        // KINO YOUTUBE
        // ==========================================
        const videaSerie0 = ["eLDXu4SgsV0", "LYwLerXP8IU", "pPAKMf3fSOY", "v20CVJoF7o0"];
        const videaSerie1 = ["HmPFKQ4Psio", "jp6HJcdiV2w", "_hp1FaOBvdw", "H6BoF7gM94k", "bl0kO0Bn-wQ", "eUM9BI1HVzQ", "VulSiC7UDpo", "yCyShKOgH3s", "p7MPC_TPYc4", "hs-Lf2Ua4gs", "OlEJqaGsJiQ", "8PrlEtzD59A", "9NbWt3uOeqI"];
        const videaSerie2 = ["3oZqKwtUpcQ", "qIoFna9QSeo", "nKBc8W0tiCA", "KEPF8woA0QU", "smY-fJSPzno", "6TPPVVvihUc", "9265g-GNmvs", "DylC_jmN3CA", "cqVWhSjPfog", "kTNuzpPhvAU", "ElMzIZD8JYU", "2ZQRSRwevtE", "1VSkeosVr40"];
        const videaSerie3 = ["8HZC79duYRQ", "LYIxZ9CdfsY", "NSGpiJCPEG0", "XlUeAMfAry8", "RaSkirrHmTk", "Jq0I57UP0Oc", "6xnKLw1Y_f8", "Zoe661tsFs8"];

        window.vykresliKino = function(filtr = 'vse') {
            let videaKVykresleni = [];
            if (filtr === 'vse') videaKVykresleni = [...videaSerie0, ...videaSerie1, ...videaSerie2, ...videaSerie3];
            else if (filtr === '0') videaKVykresleni = videaSerie0;
            else if (filtr === '1') videaKVykresleni = videaSerie1;
            else if (filtr === '2') videaKVykresleni = videaSerie2;
            else if (filtr === '3') videaKVykresleni = videaSerie3;

            let htmlKina = "";
            videaKVykresleni.forEach(idVidea => {
                htmlKina += `
                <div class="kino-karta" onclick="spustitVideo('${idVidea}')">
                    <img class="kino-img" src="https://img.youtube.com/vi/${idVidea}/hqdefault.jpg" alt="Video náhled">
                    <div class="kino-play-ikona">▶</div>
                </div>`;
            });
            document.getElementById("kinoGrid").innerHTML = htmlKina;

            const tlacitka = document.querySelectorAll(".kino-filtr-btn");
            tlacitka.forEach(btn => btn.classList.remove("aktivni"));
            if (filtr === 'vse') tlacitka[0].classList.add("aktivni");
            if (filtr === '0') tlacitka[1].classList.add("aktivni");
            if (filtr === '1') tlacitka[2].classList.add("aktivni");
            if (filtr === '2') tlacitka[3].classList.add("aktivni");
            if (filtr === '3') tlacitka[4].classList.add("aktivni");
        }

        window.spustitVideo = function(idVidea) {
            document.getElementById("videoPlayer").src = `https://www.youtube.com/embed/${idVidea}?autoplay=1`;
            document.getElementById("videoModal").style.display = "flex";
        }

        document.getElementById("zavritVideoBtn").addEventListener("click", () => {
            document.getElementById("videoPlayer").src = "";
            document.getElementById("videoModal").style.display = "none";
        });

        // ==========================================
        // LETNÍ BRIGÁDA
        // ==========================================
        function zapisDoHistorie(zprava, barva = "#3498db") {
            if (poleHistorie.length > 0 && poleHistorie[0].text === zprava) return;
            let cas = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
            poleHistorie.unshift({ text: zprava, cas: cas, barva: barva });
            if (poleHistorie.length > 15) poleHistorie.pop();
        }

        function vykresliHistorii() {
            let html = "";
            if (poleHistorie.length === 0) { html = "<p style='color:#7f8c8d; font-size:0.9em;'>Zatím se nic nestalo.</p>"; } 
            else { poleHistorie.forEach(z => { html += `<div class="historie-polozka" style="border-left-color: ${z.barva};"><span class="historie-cas">${z.cas}</span>${z.text}</div>`; }); }
            document.getElementById("historieZaznamy").innerHTML = html;
        }

        function vykresliMince(pocet) {
            if (pocet <= 0) return "<span class='mince-stitek'>Zatím bez zlaťáku</span>";
            return `<span class="mince-zlato">${"🪙".repeat(pocet)}</span>`;
        }

        function vykresliBanku() {
            let btnProplatitTomas = (roleUzivatele === "rodic" && minceTomas > 0) ? `<br><button onclick="proplatitMinci('tomas')" class="tlacitko" style="background:#f39c12; padding:6px 12px; margin-top:8px; font-size:0.85em; width:auto;">💰 Proplatit</button>` : "";
            let btnProplatitMartin = (roleUzivatele === "rodic" && minceMartin > 0) ? `<br><button onclick="proplatitMinci('martin')" class="tlacitko" style="background:#f39c12; padding:6px 12px; margin-top:8px; font-size:0.85em; width:auto;">💰 Proplatit</button>` : "";
            
            let btnResetTomas = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('tomas')" style="background:none; color:#e74c3c; border:none; margin-top:10px; cursor:pointer; font-size: 0.8em; text-decoration:underline;">Vynulovat vše Tomášovi</button>` : "";
            let btnResetMartin = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('martin')" style="background:none; color:#e74c3c; border:none; margin-top:10px; cursor:pointer; font-size: 0.8em; text-decoration:underline;">Vynulovat vše Martinovi</button>` : "";

            document.getElementById("bankaSekce").innerHTML = `
                <div class="banka-box">
                    <div class="banka-osoba">
                        <h3 class="banka-jmeno">Tomáš</h3>
                        ${vykresliMince(minceTomas)}
                        <div class="banka-drobne">Drobné: ${kontoTomas} / 1000 Kč</div>
                        ${btnProplatitTomas} ${btnResetTomas}
                    </div>
                    <div class="banka-osoba">
                        <h3 class="banka-jmeno">Martin</h3>
                        ${vykresliMince(minceMartin)}
                        <div class="banka-drobne">Drobné: ${kontoMartin} / 1000 Kč</div>
                        ${btnProplatitMartin} ${btnResetMartin}
                    </div>
                </div>`;
        }

        function zkontrolujMince() {
            while (kontoTomas >= 1000) { kontoTomas -= 1000; minceTomas++; }
            while (kontoTomas < 0 && minceTomas > 0) { kontoTomas += 1000; minceTomas--; }
            while (kontoMartin >= 1000) { kontoMartin -= 1000; minceMartin++; }
            while (kontoMartin < 0 && minceMartin > 0) { kontoMartin += 1000; minceMartin--; }
            if (kontoTomas < 0) kontoTomas = 0; if (kontoMartin < 0) kontoMartin = 0;
        }

        function ziskejAktualniOdmenu(ukol) {
            let d = new Date().toISOString().split('T')[0]; let o = parseInt(ukol.odmena) || 0; 
            if (ukol.termin && ukol.termin < d && !ukol.splneno && !ukol.cekaNaPotvrzeni) return Math.floor(o / 2); 
            return o;
        }

        function vykresliUkoly() {
            let html = "";
            if (poleUkolu.length === 0) html = "<p style='color: #7f8c8d; font-size:0.9em;'>Zatím tu nejsou žádné úkoly.</p>";
            let d = new Date().toISOString().split('T')[0];

            poleUkolu.forEach((ukol, index) => {
                let lH = ""; let pH = "";
                let tS = (roleUzivatele === "rodic") ? `<button class="smazat-btn" onclick="smazUkol(${index})" title="Smazat úkol">✖</button>` : "";
                let aO = ziskejAktualniOdmenu(ukol);
                let sP = (ukol.termin && ukol.termin < d && !ukol.splneno) ? `<span class="odmena-stitek stitek-pozde">Zpoždění</span>` : "";
                let dT = ukol.termin ? `<span class="datum-text">⏰ Do: ${ukol.termin.split('-').reverse().join('.')}</span>` : "";

                if (ukol.splneno) {
                    let jS = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    lH = `<input type="checkbox" checked disabled><div><span class="text-ukolu" style="text-decoration:line-through; opacity:0.5;">${ukol.nazev} <span style="font-size:0.8em; color:#2ecc71; font-weight:normal;">(Schválil rodič pro: ${jS})</span></span>${dT}</div>`;
                    pH = `<span class="odmena-stitek" style="opacity:0.5; background:#7f8c8d; color:white;">${aO} Kč</span> ${tS}`;
                } else if (ukol.cekaNaPotvrzeni) {
                    let jZ = slovnikJmen[`${ukol.splnilKdo}@turecek.cz`] || ukol.splnilKdo;
                    if (roleUzivatele === "rodic") {
                        lH = `<span style="font-size: 1.2em; margin-right:12px;">⏳</span><div><span class="text-ukolu" style="color:#f39c12;">${jZ} žádá o schválení: <b>${ukol.nazev}</b></span>${dT}</div>`;
                        pH = `<button onclick="schvalitUkol(${index})" class="tlacitko-schvalit">Schválit</button><button onclick="zamitnoutUkol(${index})" class="tlacitko-zamitnout" style="margin-left:5px;">Zamítnout</button>${tS}`;
                    } else if (roleUzivatele === ukol.splnilKdo) {
                        lH = `<input type="checkbox" checked onchange="zrusitZadost(${index})"><div><span class="text-ukolu" style="color:#f39c12;">⏳ Čekáš na kontrolu: ${ukol.nazev}</span>${dT}</div>`;
                        pH = `<span class="odmena-stitek">${aO} Kč</span>`;
                    } else {
                        lH = `<input type="checkbox" disabled checked><div><span class="text-ukolu" style="color:#7f8c8d;">🔒 ${jZ} již odevzdal: ${ukol.nazev}</span>${dT}</div>`;
                        pH = `<span class="odmena-stitek" style="background:#7f8c8d; color:white;">${aO} Kč</span>`;
                    }
                } else {
                    let dis = (roleUzivatele === "rodic") ? "disabled" : "";
                    lH = `<input type="checkbox" ${dis} onchange="pozadatOSchvaleni(${index})"><div><span class="text-ukolu">${ukol.nazev}</span>${dT}</div>`;
                    pH = `${sP} <span class="odmena-stitek">${aO} Kč</span> ${tS}`;
                }
                html += `<div class="ukol-karta" style="${ukol.splneno ? 'opacity:0.6;' : ''}"><div class="ukol-leva-cast">${lH}</div><div style="display:flex; align-items:center;">${pH}</div></div>`;
            });
            document.getElementById("seznamUkolu").innerHTML = html;
            vykresliBanku(); vykresliHistorii(); 
        }

        function ulozDoDatabaze() {
            zkontrolujMince(); 
            setDoc(doc(db, "ukoly", "seznam"), { dataUkolu: poleUkolu, historieZaznamy: poleHistorie, bankaTomas: kontoTomas, minceTomas: minceTomas, bankaMartin: kontoMartin, minceMartin: minceMartin });
        }

        function stahniDataZDatabaze() {
            document.getElementById("seznamUkolu").innerHTML = "<p style='color:#95a5a6;'>Načítám data...</p>";
            getDoc(doc(db, "ukoly", "seznam")).then((dokument) => {
                if (dokument.exists()) {
                    let data = dokument.data();
                    poleUkolu = data.dataUkolu || []; poleHistorie = data.historieZaznamy || [];
                    kontoTomas = parseInt(data.bankaTomas) || 0; minceTomas = parseInt(data.minceTomas) || 0;
                    kontoMartin = parseInt(data.bankaMartin) || 0; minceMartin = parseInt(data.minceMartin) || 0;
                } else {
                    poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0;
                }
                zkontrolujMince(); vykresliUkoly();
            }).catch((chyba) => { console.error(chyba); });
        }

        window.pozadatOSchvaleni = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = true; u.splneno = false; u.splnilKdo = roleUzivatele; zapisDoHistorie(`⏳ ${jmenoAktualni} dokončil úkol "${u.nazev}".`, "#f39c12"); ulozDoDatabaze(); vykresliUkoly(); };
        window.zrusitZadost = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splnilKdo = null; poleHistorie = poleHistorie.filter(z => !(z.text.includes(u.nazev) && z.text.includes("dokončil úkol"))); ulozDoDatabaze(); vykresliUkoly(); };
        window.schvalitUkol = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splneno = true; let c = ziskejAktualniOdmenu(u); u.odmena = c; if (u.splnilKdo === "tomas") kontoTomas += c; if (u.splnilKdo === "martin") kontoMartin += c; document.getElementById('zvukCinknuti')?.play().catch(e=>e); zapisDoHistorie(`✅ Rodič schválil úkol "${u.nazev}".`, "#2ecc71"); ulozDoDatabaze(); vykresliUkoly(); };
        window.zamitnoutUkol = function(index) { let u = poleUkolu[index]; u.cekaNaPotvrzeni = false; u.splneno = false; u.splnilKdo = null; zapisDoHistorie(`❌ Rodič zamítl úkol "${u.nazev}".`, "#e74c3c"); ulozDoDatabaze(); vykresliUkoly(); }
        window.smazUkol = function(index) { zapisDoHistorie(`🗑️ Úkol "${poleUkolu[index].nazev}" smazán.`, "#95a5a6"); poleUkolu.splice(index, 1); ulozDoDatabaze(); vykresliUkoly(); };
        window.proplatitMinci = function(k) { if (confirm(`Odečíst 1 Zlaťák? (Znamená to, že jsi dal 1000 Kč v hotovosti)`)) { if (k === "tomas" && minceTomas > 0) minceTomas--; if (k === "martin" && minceMartin > 0) minceMartin--; zapisDoHistorie(`💰 Rodič proplatil 1 Zlaťák.`, "#9b59b6"); ulozDoDatabaze(); vykresliUkoly(); } }
        window.vynulovatKonto = function(k) { if (confirm(`Opravdu vynulovat konto?`)) { if (k === "tomas") { kontoTomas = 0; minceTomas = 0; } if (k === "martin") { kontoMartin = 0; minceMartin = 0; } zapisDoHistorie(`⚠️ Konto vynulováno.`, "#e74c3c"); ulozDoDatabaze(); vykresliUkoly(); } }

        document.getElementById("pridatBtn").addEventListener("click", () => { let n = document.getElementById("novyUkol").value; let o = parseInt(document.getElementById("novaOdmena").value) || 0; let t = document.getElementById("novyDatum").value; if (n.trim() !== "" && o > 0) { poleUkolu.push({ nazev: n, odmena: o, termin: t, splneno: false, cekaNaPotvrzeni: false, splnilKdo: null }); zapisDoHistorie(`➕ Přidán úkol: "${n}".`); ulozDoDatabaze(); vykresliUkoly(); document.getElementById("novyUkol").value = ""; document.getElementById("novaOdmena").value = ""; document.getElementById("novyDatum").value = ""; } else { alert("Zadej název a částku!"); } });
        document.getElementById("malyRefreshBtn").addEventListener("click", () => { stahniDataZDatabaze(); });
        
        // Změna designu tlačítka Odznačit vše
        document.getElementById("odznacitVseBtn").addEventListener("click", () => { if (confirm("Vyčistit všechny úkoly na další den?")) { poleUkolu.forEach(u => { u.splneno = false; u.cekaNaPotvrzeni = false; u.splnilKdo = null; }); zapisDoHistorie(`🧹 Úkoly připraveny na nový den.`, "#2ecc71"); ulozDoDatabaze(); vykresliUkoly(); } });
        
        // Změna u mazání historie (teď je to ikonka u nadpisu)
        document.getElementById("smazatHistoriiBtn").addEventListener("click", () => { if (confirm("Opravdu vymazat historii?")) { poleHistorie = []; ulozDoDatabaze(); vykresliHistorii(); } });

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value.toLowerCase().trim();
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo).then(() => {
                jmenoAktualni = slovnikJmen[email] || "Neznámý uživatel";
                
                // NASTAVENÍ VIDITELNOSTI
                if (eMailyRodicu.includes(email)) {
                    roleUzivatele = "rodic";
                    document.getElementById("ridiciPanel").style.display = "flex";
                    document.getElementById("odznacitVseBtn").style.display = "inline-block";
                    document.getElementById("smazatHistoriiBtn").style.display = "inline-block"; 
                    document.getElementById("kartaKino").style.display = "none";
                } else if (email === "tomas@turecek.cz") {
                    roleUzivatele = "tomas";
                    document.getElementById("ridiciPanel").style.display = "none";
                    document.getElementById("odznacitVseBtn").style.display = "none";
                    document.getElementById("smazatHistoriiBtn").style.display = "none";
                    document.getElementById("kartaKino").style.display = "flex"; 
                } else if (email === "martin@turecek.cz") {
                    roleUzivatele = "martin";
                    document.getElementById("ridiciPanel").style.display = "none";
                    document.getElementById("odznacitVseBtn").style.display = "none";
                    document.getElementById("smazatHistoriiBtn").style.display = "none";
                    document.getElementById("kartaKino").style.display = "none";
                }

                document.getElementById("jmenoPrihlaseneho").innerText = jmenoAktualni;
                document.getElementById("uvitaciText").style.display = "none";
                document.getElementById("uzivatelPanel").style.display = "flex";
                document.getElementById("loginSekce").style.display = "none";
                document.getElementById("tajnyObsah").style.display = "block";
                
                vykresliKino('vse');
                zobrazModul('obsahRozcestnik', 'Osobní Portál');
                stahniDataZDatabaze(); 
            }).catch((error) => { alert("Špatný e-mail nebo heslo!"); });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("uzivatelPanel").style.display = "none"; 
                document.getElementById("uvitaciText").style.display = "block";
                document.getElementById("hlavniNadpis").innerText = "Osobní Portál";
                document.getElementById("emailInput").value = ""; document.getElementById("hesloInput").value = ""; 
                poleUkolu = []; poleHistorie = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0; roleUzivatele = "";
            });
        });
    </script>
</body>
</html>
