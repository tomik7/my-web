<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letní brigáda</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #1a2a6c, #11998e, #38ef7d);
            background-size: 400% 400%;
            animation: pozadiAnimace 15s ease infinite;
            color: white; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @keyframes pozadiAnimace { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .kontejner {
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center; width: 90%; max-width: 650px; margin: 20px 0;
        }

        .top-panel {
            display: none; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3); padding: 10px 20px;
            border-radius: 15px; margin-bottom: 20px; font-size: 1.1em;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .maly-refresh {
            background: #3498db; border: none; color: white;
            border-radius: 50%; width: 40px; height: 40px;
            cursor: pointer; transition: 0.3s; display: flex;
            align-items: center; justify-content: center; font-size: 1.2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .maly-refresh:hover { background: #2980b9; transform: rotate(180deg); }

        h1 { margin-top: 10px; font-size: 2.2em; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        .podtitul { color: #f1c40f; font-weight: bold; margin-bottom: 25px; font-size: 1.1em; }
        
        input[type="email"], input[type="password"], input[type="text"], input[type="number"], input[type="date"] {
            padding: 12px; border-radius: 10px; border: none; outline: none;
            font-size: 16px; margin-bottom: 15px; box-sizing: border-box; 
            background: rgba(255,255,255,0.9); font-family: inherit;
        }

        .tlacitko {
            padding: 15px 20px; border: none; border-radius: 10px;
            font-size: 1.1em; font-weight: bold; color: white; cursor: pointer;
            transition: 0.3s; width: 100%;
        }
        .tlacitko-login { background: #2ecc71; }
        .tlacitko-login:hover { background: #27ae60; transform: translateY(-3px); }
        .tlacitko-logout { background: #e74c3c; margin-top: 20px; }
        .tlacitko-pridat { background: #f39c12; width: auto; margin-top: 0; padding: 12px; }
        .tlacitko-pridat:hover { background: #e67e22; }

        #tajnyObsah { display: none; }
        #bankaSekce { margin-bottom: 20px; }
        
        .pridavani-box {
            display: none; gap: 10px; margin-bottom: 25px;
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px;
            border: 1px dashed #f1c40f; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .pridavani-box input { margin-bottom: 0; width: auto; flex-grow: 1; }
        
        .ukol-karta {
            background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 20px; margin-bottom: 10px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between; text-align: left;
            transition: 0.3s; flex-wrap: wrap; gap: 10px;
        }
        .ukol-karta:hover { background: rgba(255, 255, 255, 0.25); transform: translateX(5px); }
        
        .ukol-leva-cast { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; accent-color: #2ecc71; flex-shrink: 0; }
        .text-ukolu { font-size: 1.2em; font-weight: bold; transition: 0.3s; }
        
        .odmena-stitek {
            background: #ffdf00; color: #333; padding: 5px 10px;
            border-radius: 20px; font-weight: bold; font-size: 0.9em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); white-space: nowrap;
        }

        .stitek-pozde { background: #e74c3c; color: white; margin-right: 10px; font-size: 0.8em; }
        .hotovo { opacity: 0.5; }
        .hotovo .text-ukolu { text-decoration: line-through; color: rgba(255,255,255,0.6); }
        
        .smazat-btn {
            background: transparent; border: none; color: #ff7675; cursor: pointer;
            font-size: 1.2em; transition: 0.3s; margin-left: 10px;
        }
        .smazat-btn:hover { color: #d63031; transform: scale(1.2); }
        
        .odznak-kdo { font-size: 0.7em; background: #3498db; padding: 3px 8px; border-radius: 10px; margin-left: 10px; color: white; text-decoration: none !important;}
        .datum-text { font-size: 0.8em; color: #bdc3c7; display: block; margin-top: 5px; font-weight: normal; }
        
        .mince-text { font-size: 1.6em; margin: 10px 0; letter-spacing: 3px; }
    </style>
</head>
<body>

    <div class="kontejner">
        <div class="top-panel" id="uzivatelPanel">
            <span style="font-weight: bold; color: #f1c40f;">👤 <span id="jmenoPrihlaseneho"></span></span>
            <button id="malyRefreshBtn" class="maly-refresh" title="Zkontrolovat nové úkoly">🔄</button>
        </div>

        <h1>Letní brigáda 💰</h1>
        <p class="podtitul" id="uvitaciText">Přihlas se pro přístup k úkolům</p>
        
        <div id="loginSekce">
            <input type="email" id="emailInput" placeholder="Tvůj e-mail..." style="width: 100%;">
            <input type="password" id="hesloInput" placeholder="Tvé heslo..." style="width: 100%;">
            <button id="loginBtn" class="tlacitko tlacitko-login">Vstoupit</button>
        </div>

        <div id="tajnyObsah">
            <div id="bankaSekce"></div>

            <div class="pridavani-box" id="ridiciPanel">
                <input type="text" id="novyUkol" placeholder="Název úkolu...">
                <input type="date" id="novyDatum" title="Dokdy to musí být? (Nepovinné)">
                <input type="number" id="novaOdmena" placeholder="Částka" style="width: 90px;">
                <span style="font-weight: bold; font-size: 1.2em;">Kč</span>
                <button id="pridatBtn" class="tlacitko tlacitko-pridat">➕</button>
            </div>
            
            <div id="seznamUkolu">Načítám data...</div>

            <button id="odznacitVseBtn" class="tlacitko" style="background: #9b59b6; margin-top: 15px; display: none;">🧹 Odznačit všechny úkoly (Příprava na další den)</button>

            <button id="logoutBtn" class="tlacitko tlacitko-logout">Odhlásit se a zamknout</button>
        </div>
    </div>

    <audio id="zvukCinknuti" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9PqKSsLJkv8DFewTSedXuUGSLw-U719Y",
            authDomain: "muj-web-heslo.firebaseapp.com",
            projectId: "muj-web-heslo",
            storageBucket: "muj-web-heslo.firebasestorage.app",
            messagingSenderId: "527159202010",
            appId: "1:527159202010:web:4863618e3aa8eb3cac55e3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        setPersistence(auth, inMemoryPersistence);

        let poleUkolu = [];
        let kontoTomas = 0; let minceTomas = 0;
        let kontoMartin = 0; let minceMartin = 0;
        
        const eMailyRodicu = ["lenka@turecek.cz", "radek@turecek.cz"];
        
        const slovnikJmen = {
            "lenka@turecek.cz": "Lenka (Máma)",
            "radek@turecek.cz": "Radek (Táta)",
            "tomas@turecek.cz": "Tomáš",
            "martin@turecek.cz": "Martin"
        };
        
        let roleUzivatele = ""; 

        // Vykreslení mincí - přidán šedý štítek pro 0 mincí
        function vykresliMince(pocet) {
            if (pocet <= 0) return "<span class='odmena-stitek' style='background: #7f8c8d; color: white; font-size: 0.6em; padding: 5px 10px;'>Zatím bez zlaťáku</span>";
            return "🪙".repeat(pocet);
        }

        function vykresliBanku() {
            let limit = 1000;
            
            // Tlačítka
            let btnProplatitTomas = (roleUzivatele === "rodic" && minceTomas > 0) ? `<button onclick="proplatitMinci('tomas')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            let btnProplatitMartin = (roleUzivatele === "rodic" && minceMartin > 0) ? `<button onclick="proplatitMinci('martin')" class="tlacitko" style="background:#f39c12; padding:8px; margin-top:10px; font-size:0.9em;">💰 Proplatit Zlaťák</button>` : "";
            
            // Nový vzhled pro Vynulovat
            let btnResetTomas = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('tomas')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";
            let btnResetMartin = (roleUzivatele === "rodic") ? `<br><button onclick="vynulovatKonto('martin')" class="odmena-stitek" style="background:#e74c3c; color:white; border:none; margin-top:15px; cursor:pointer; padding: 8px 15px; font-size: 0.8em;">✖ Vynulovat banku</button>` : "";

            document.getElementById("bankaSekce").innerHTML = `
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1); flex-wrap:wrap; gap:10px;">
                    <div style="min-width: 200px;">
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Tomáš</h3>
                        <div class="mince-text" title="Zlaťáky">${vykresliMince(minceTomas)}</div>
                        <b style="font-size:1.1em;">Drobné: ${kontoTomas} / ${limit} Kč</b><br>
                        ${btnProplatitTomas} ${btnResetTomas}
                    </div>
                    <div style="min-width: 200px;">
                        <h3 style="margin:0 0 5px 0; color:#38ef7d;">Martin</h3>
                        <div class="mince-text" title="Zlaťáky">${vykresliMince(minceMartin)}</div>
                        <b style="font-size:1.1em;">Drobné: ${kontoMartin} / ${limit} Kč</b><br>
                        ${btnProplatitMartin} ${btnResetMartin}
                    </div>
                </div>
            `;
        }

        function zkontrolujMince() {
            let bouchatKonfety = false;

            while (kontoTomas >= 1000) {
                kontoTomas -= 1000; minceTomas++;
                if (roleUzivatele === "tomas") bouchatKonfety = true;
            }
            while (kontoTomas < 0 && minceTomas > 0) {
                kontoTomas += 1000; minceTomas--;
            }

            while (kontoMartin >= 1000) {
                kontoMartin -= 1000; minceMartin++;
                if (roleUzivatele === "martin") bouchatKonfety = true;
            }
            while (kontoMartin < 0 && minceMartin > 0) {
                kontoMartin += 1000; minceMartin--;
            }

            if (kontoTomas < 0) kontoTomas = 0;
            if (kontoMartin < 0) kontoMartin = 0;

            if (bouchatKonfety && typeof confetti === "function") {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }
        }

        function ziskejAktualniOdmenu(ukol) {
            let dnes = new Date().toISOString().split('T')[0];
            let odmenaCislo = parseInt(ukol.odmena) || 0; 
            if (ukol.termin && ukol.termin < dnes && !ukol.splneno) {
                return Math.floor(odmenaCislo / 2); 
            }
            return odmenaCislo;
        }

        function vykresliUkoly() {
            let html = "";
            if (poleUkolu.length === 0) { html = "<p style='color: rgba(255,255,255,0.7);'>Žádné úkoly k dispozici. Paráda! 🏖️</p>"; }

            let dnes = new Date().toISOString().split('T')[0];

            poleUkolu.forEach((ukol, index) => {
                let checked = ukol.splneno ? "checked" : "";
                let tridaHotovo = ukol.splneno ? "hotovo" : "";
                let tlacitkoSmazat = (roleUzivatele === "rodic") ? `<button class="smazat-btn" onclick="smazUkol(${index})">✖</button>` : "";
                let odznak = "";
                
                if (ukol.splneno && ukol.splnilKdo === "tomas") odznak = `<span class="odznak-kdo">Splnil Tomáš</span>`;
                if (ukol.splneno && ukol.splnilKdo === "martin") odznak = `<span class="odznak-kdo">Splnil Martin</span>`;

                let datumText = ukol.termin ? `<span class="datum-text">⏰ Do: ${ukol.termin.split('-').reverse().join('.')}</span>` : "";
                let stitekPozde = "";
                let aktualniOdmena = ziskejAktualniOdmenu(ukol);
                
                if (ukol.termin && ukol.termin < dnes && !ukol.splneno) {
                    stitekPozde = `<span class="odmena-stitek stitek-pozde">PO TERMÍNU (-50 %)</span>`;
                }

                html += `
                <div class="ukol-karta ${tridaHotovo}">
                    <div class="ukol-leva-cast">
                        <input type="checkbox" ${checked} onchange="zmenStav(${index}, this.checked)">
                        <div>
                            <span class="text-ukolu">${ukol.nazev} ${odznak}</span>
                            ${datumText}
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${stitekPozde}
                        <span class="odmena-stitek">${aktualniOdmena} Kč</span>
                        ${tlacitkoSmazat}
                    </div>
                </div>`;
            });
            document.getElementById("seznamUkolu").innerHTML = html;
            vykresliBanku();
        }

        function ulozDoDatabaze() {
            zkontrolujMince(); 
            const tajneUkoly = doc(db, "ukoly", "seznam");
            setDoc(tajneUkoly, { 
                dataUkolu: poleUkolu, 
                bankaTomas: kontoTomas, minceTomas: minceTomas,
                bankaMartin: kontoMartin, minceMartin: minceMartin 
            });
        }

        function stahniDataZDatabaze() {
            document.getElementById("seznamUkolu").innerHTML = "Načítám čerstvá data...";
            const tajneUkoly = doc(db, "ukoly", "seznam");
            getDoc(tajneUkoly).then((dokument) => {
                if (dokument.exists()) {
                    let data = dokument.data();
                    poleUkolu = data.dataUkolu || [];
                    kontoTomas = parseInt(data.bankaTomas) || 0;
                    minceTomas = parseInt(data.minceTomas) || 0;
                    kontoMartin = parseInt(data.bankaMartin) || 0;
                    minceMartin = parseInt(data.minceMartin) || 0;
                } else {
                    poleUkolu = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0;
                }
                zkontrolujMince(); 
                vykresliUkoly();
            }).catch((chyba) => { console.error(chyba); });
        }

        window.zmenStav = function(index, jeSplneno) {
            let ukol = poleUkolu[index];

            if (jeSplneno) {
                if (roleUzivatele === "rodic") {
                    alert("Vy úkoly plnit nemůžete, nechte to na kluky! 😄");
                    vykresliUkoly(); return;
                }
                let castka = ziskejAktualniOdmenu(ukol); 
                document.getElementById('zvukCinknuti')?.play().catch(e => console.log("Zvuk blokován"));
                
                ukol.splneno = true; ukol.splnilKdo = roleUzivatele; ukol.odmena = castka; 
                
                if (roleUzivatele === "tomas") kontoTomas += castka;
                if (roleUzivatele === "martin") kontoMartin += castka;
            } else {
                if (roleUzivatele !== "rodic" && roleUzivatele !== ukol.splnilKdo) {
                    alert("Tento úkol už splnil brácha! Nemůžeš mu ho zrušit. 🛑");
                    vykresliUkoly(); return;
                }
                ukol.splneno = false;
                let castkaKOdecteni = parseInt(ukol.odmena) || 0;
                
                if (ukol.splnilKdo === "tomas") kontoTomas -= castkaKOdecteni;
                if (ukol.splnilKdo === "martin") kontoMartin -= castkaKOdecteni;
                ukol.splnilKdo = null;
            }
            ulozDoDatabaze();
            vykresliUkoly();
        };

        window.smazUkol = function(index) {
            poleUkolu.splice(index, 1);
            ulozDoDatabaze();
            vykresliUkoly();
        };

        window.proplatitMinci = function(koho) {
            if (confirm("Opravdu jsi předal 1000 Kč v hotovosti? Zlaťák se trvale smaže z webu.")) {
                if (koho === "tomas" && minceTomas > 0) minceTomas--;
                if (koho === "martin" && minceMartin > 0) minceMartin--;
                ulozDoDatabaze();
                vykresliUkoly();
            }
        }

        window.vynulovatKonto = function(koho) {
            if (confirm("POZOR! Smažeš všechny peníze i Zlaťáky pro tohoto uživatele. Jsi si jistý?")) {
                if (koho === "tomas") { kontoTomas = 0; minceTomas = 0; }
                if (koho === "martin") { kontoMartin = 0; minceMartin = 0; }
                ulozDoDatabaze();
                vykresliUkoly();
            }
        }

        document.getElementById("pridatBtn").addEventListener("click", () => {
            let nazev = document.getElementById("novyUkol").value;
            let odmena = parseInt(document.getElementById("novaOdmena").value) || 0;
            let termin = document.getElementById("novyDatum").value;

            if (nazev.trim() !== "" && odmena > 0) {
                poleUkolu.push({ nazev: nazev, odmena: odmena, termin: termin, splneno: false, splnilKdo: null });
                ulozDoDatabaze();
                vykresliUkoly();
                document.getElementById("novyUkol").value = "";
                document.getElementById("novaOdmena").value = "";
                document.getElementById("novyDatum").value = "";
            } else { alert("Musíš zadat název a částku!"); }
        });

        document.getElementById("malyRefreshBtn").addEventListener("click", () => { stahniDataZDatabaze(); });

        // Tlačítko pro rodiče na HROMADNÉ ODZNAČENÍ
        document.getElementById("odznacitVseBtn").addEventListener("click", () => {
            if (confirm("Opravdu vyčistit všechny úkoly? (Peníze klukům zůstanou v bance nezměněny. Slouží k přípravě úkolů na další den.)")) {
                poleUkolu.forEach(ukol => {
                    ukol.splneno = false;
                    ukol.splnilKdo = null;
                });
                ulozDoDatabaze();
                vykresliUkoly();
            }
        });

        document.getElementById("loginBtn").addEventListener("click", () => {
            const email = document.getElementById("emailInput").value.toLowerCase().trim();
            const heslo = document.getElementById("hesloInput").value;

            signInWithEmailAndPassword(auth, email, heslo)
                .then(() => {
                    if (eMailyRodicu.includes(email)) {
                        roleUzivatele = "rodic";
                        document.getElementById("ridiciPanel").style.display = "flex";
                        document.getElementById("odznacitVseBtn").style.display = "block"; // Zobrazit rodičům
                    } else if (email === "tomas@turecek.cz") {
                        roleUzivatele = "tomas";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    } else if (email === "martin@turecek.cz") {
                        roleUzivatele = "martin";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    } else {
                        roleUzivatele = "neznamy";
                        document.getElementById("ridiciPanel").style.display = "none";
                        document.getElementById("odznacitVseBtn").style.display = "none";
                    }

                    let jmenoKZobrazeni = slovnikJmen[email] || "Neznámý uživatel";
                    document.getElementById("jmenoPrihlaseneho").innerText = jmenoKZobrazeni;
                    document.getElementById("uzivatelPanel").style.display = "flex";
                    document.getElementById("loginSekce").style.display = "none";
                    document.getElementById("tajnyObsah").style.display = "block";
                    
                    stahniDataZDatabaze(); 
                })
                .catch((error) => { alert("Špatný e-mail nebo heslo!"); });
        });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            signOut(auth).then(() => {
                document.getElementById("tajnyObsah").style.display = "none";
                document.getElementById("loginSekce").style.display = "block";
                document.getElementById("uzivatelPanel").style.display = "none"; 
                document.getElementById("emailInput").value = ""; 
                document.getElementById("hesloInput").value = ""; 
                poleUkolu = []; kontoTomas = 0; kontoMartin = 0; minceTomas = 0; minceMartin = 0; roleUzivatele = "";
            });
        });
    </script>
</body>
</html>
