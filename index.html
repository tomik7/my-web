<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomáš Tureček - Můj Web</title>
    <style>
        /* Základní vzhled stránky */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
            min-height: 100vh;
        }
        /* Průhledný rámeček uprostřed */
        .kontejner {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 0 auto;
            backdrop-filter: blur(10px); 
        }
        /* Profilová fotka */
        img.profilovka {
            width: 150px;
            height: 150px;
            border-radius: 50%; 
            border: 4px solid white;
            margin-bottom: 20px;
        }
        /* Společný styl pro obě tlačítka */
        .tlacitko {
            display: inline-block;
            margin: 10px;
            padding: 12px 30px;
            background-color: #ff7e67;
            color: white;
            text-decoration: none; 
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s; 
        }
        /* Zvětšení tlačítka po najetí myší */
        .tlacitko:hover {
            transform: scale(1.05); 
            filter: brightness(1.1);
        }
        /* Speciální barvy pro Instagram tlačítko */
        .ig-tlacitko {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        /* Rámeček pro video */
        .video-box {
            margin-top: 15px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }
        /* Styl pro text nad videem */
        h3 {
            margin-top: 40px;
            margin-bottom: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div class="kontejner">
        <img src="https://github.com/tomik7.png" alt="Tomáš Tureček" class="profilovka">
        
        <h1>Ahoj, já jsem Tomáš! 🚀</h1>
        <p>Vítejte na mém webe, který je zrovna v rekonstrukci, ale bude se postupně vylepšovat!.</p>
        
        <div>
            <a href="https://github.com/tomik7" target="_blank" class="tlacitko">Můj GitHub</a>
            <a href="https://www.instagram.com/tom_turecek/#" target="_blank" class="tlacitko ig-tlacitko">Můj Instagram</a>
        </div>
        
        <h3>Současný oblíbený song: </h3>
        
        <div class="video-box">
            <iframe width="100%" height="315" src="https://www.youtube.com/embed/p1J1NakmZRw" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
